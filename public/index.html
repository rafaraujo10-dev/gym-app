<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#f5f5f7"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>GymApp</title>
  <style>
    :root{
      --bg:#f5f5f7; --card:#fff; --card2:#ededf0;
      --border:rgba(0,0,0,.07); --border2:rgba(0,0,0,.12);
      --text:#111114; --subtle:#6e6e80; --muted:#aeaebe;
      --accent:#5b4fff; --accent-light:#ede9ff; --accent-dark:#4338e0;
      --green:#16a34a; --green-light:#dcfce7;
      --orange:#ea580c; --orange-light:#ffedd5;
      --red:#dc2626; --red-light:#fee2e2;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overscroll-behavior:none;}
    button,input,select,textarea{font-family:inherit;}
    #app{max-width:430px;margin:0 auto;min-height:100vh;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    @keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
    @keyframes pop{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
    .fade-in{animation:fadeUp .25s ease both;}
    .slide-in{animation:slideIn .25s ease both;}

    .px{padding-left:20px;padding-right:20px;}
    .pt-safe{padding-top:max(20px,env(safe-area-inset-top));}

    /* Cards */
    .card{background:var(--card);border-radius:20px;overflow:hidden;box-shadow:0 1px 12px rgba(0,0,0,.06);}
    .card-sm{background:var(--card);border-radius:14px;padding:16px;box-shadow:0 1px 8px rgba(0,0,0,.05);}
    .card-flat{background:var(--card);border-radius:14px;padding:16px;border:1.5px solid var(--border);}

    /* Buttons */
    .btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;transition:transform .1s,opacity .15s,background .15s;}
    .btn:active{transform:scale(.98);opacity:.88;}
    .btn-dark{background:var(--text);color:#fff;}
    .btn-accent{background:var(--accent);color:#fff;}
    .btn-ghost{background:transparent;border:1.5px solid var(--border2);color:var(--subtle);}
    .btn-light{background:var(--card2);color:var(--text);}
    .btn-green{background:var(--green);color:#fff;}

    /* Inputs */
    .inp{width:100%;padding:14px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:16px;outline:none;transition:border-color .15s;}
    .inp:focus{border-color:var(--accent);}
    select.inp{-webkit-appearance:none;}

    /* Bottom nav */
    .bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom,0);}
    .bnav-btn{flex:1;padding:10px 0 12px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
    .bnav-btn .ic{font-size:21px;}
    .bnav-btn .lb{font-size:10px;font-weight:500;color:var(--muted);}
    .bnav-btn.on .lb{color:var(--accent);}

    /* Labels */
    .label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.07em;font-weight:600;}

    /* Chips */
    .chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;}
    .chip-green{background:var(--green-light);color:var(--green);}
    .chip-orange{background:var(--orange-light);color:var(--orange);}
    .chip-accent{background:var(--accent-light);color:var(--accent);}
    .chip-red{background:var(--red-light);color:var(--red);}

    /* Set row */
    .set-row{display:flex;align-items:center;padding:14px 16px;gap:12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
    .set-row:last-child{border-bottom:none;}
    .set-row.done{background:#f0fdf4;}
    .set-row.active{background:var(--accent-light);}

    /* Rep grid */
    .rep-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
    .rep-btn{padding:14px 0;background:var(--card);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:16px;font-weight:500;cursor:pointer;transition:all .1s;}
    .rep-btn:active{background:var(--accent);color:#fff;border-color:var(--accent);}

    /* Progress */
    .prog-bar{height:3px;background:var(--card2);border-radius:4px;overflow:hidden;}
    .prog-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s ease;}

    /* Overlay / Sheet */
    .overlay{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;background:rgba(0,0,0,.45);}
    .sheet{background:var(--card);border-radius:24px 24px 0 0;padding:20px 20px max(32px,env(safe-area-inset-bottom));width:100%;max-width:430px;max-height:88vh;overflow-y:auto;}
    .sheet-handle{width:40px;height:4px;background:var(--card2);border-radius:4px;margin:0 auto 20px;}

    /* Onboarding step */
    .ob-step{padding:0 20px 40px;min-height:100vh;display:flex;flex-direction:column;justify-content:center;}

    /* Day picker */
    .day-cell{flex:1;aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:1.5px solid var(--border);background:var(--card);transition:all .15s;}
    .day-cell.on{background:var(--accent);border-color:var(--accent);}
    .day-cell.on span{color:#fff !important;}

    /* Select pill */
    .sel-pill{padding:12px 16px;border-radius:12px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all .15s;text-align:center;}
    .sel-pill.on{border-color:var(--accent);background:var(--accent-light);}
    .sel-pill.on p{color:var(--accent);}

    /* Workout hero */
    .hero-card{background:linear-gradient(135deg,#5b4fff 0%,#7c6fff 100%);border-radius:20px;padding:24px;color:#fff;box-shadow:0 8px 28px rgba(91,79,255,.28);}

    /* Stat box */
    .stat-box{background:var(--card);border-radius:16px;padding:16px;box-shadow:0 1px 8px rgba(0,0,0,.05);}

    /* Weight test row */
    .wt-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:10px;}
    .wt-row:last-child{border-bottom:none;}
  </style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';
// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const DAY_NAMES=['Domingo','Segunda','Terca','Quarta','Quinta','Sexta','Sabado'];
const DAY_SHORT=['D','S','T','Q','Q','S','S'];
const WORKOUT_KEYS=['A','B','C','D','E'];
const TYPE_EMOJI={upper:'💪',legs:'🦵',core:'🔥'};

// Exercise library — full pool
const EX_LIBRARY = {
  // Upper — Pull
  'Precor Pulldown 304':        {type:'upper',group:'pull'},
  'Genesis Lat':                {type:'upper',group:'pull'},
  'Precor Low Row':             {type:'upper',group:'pull'},
  'Precor Seated Row':          {type:'upper',group:'pull'},
  'Genesis Dual Cable':         {type:'upper',group:'pull'},
  'Genesis Chin / Dip Assist':  {type:'upper',group:'pull'},
  // Upper — Push
  'Genesis Multiplane Chest':   {type:'upper',group:'push'},
  'Dumbbell Bench Press':       {type:'upper',group:'push'},
  // Upper — Shoulder
  'Genesis Multiplane Shoulder':{type:'upper',group:'shoulder',caution:'Max 90°'},
  // Upper — Arms
  'Genesis Biceps':             {type:'upper',group:'arms'},
  'Genesis Biceps Preacher':    {type:'upper',group:'arms'},
  'Genesis Triceps':            {type:'upper',group:'arms'},
  'Genesis Triceps Seated':     {type:'upper',group:'arms'},
  // Legs
  'Leg Extension':              {type:'legs',group:'quad'},
  'Leg Curl':                   {type:'legs',group:'ham'},
  'Prone Leg Curl':             {type:'legs',group:'ham'},
  'Genesis Total Quad / Hip':   {type:'legs',group:'quad'},
  'Genesis Total Glute / Ham':  {type:'legs',group:'glute'},
  'Inner Thigh':                {type:'legs',group:'adductor'},
  'Outer Thigh':                {type:'legs',group:'abductor'},
  'Genesis Multiplane Calf':    {type:'legs',group:'calf'},
  // Core
  'Decline Sit-up':             {type:'core',group:'core'},
};

// Default weight estimates by level (lb) — will be scaled by body weight
const BASE_WEIGHTS = {
  'Precor Pulldown 304':        {beg:50, int:70,  adv:90,  unit:'lb'},
  'Genesis Lat':                {beg:45, int:60,  adv:80,  unit:'lb'},
  'Precor Low Row':             {beg:55, int:80,  adv:100, unit:'lb'},
  'Precor Seated Row':          {beg:45, int:60,  adv:80,  unit:'lb'},
  'Genesis Dual Cable':         {beg:12, int:17,  adv:22,  unit:'lb'},
  'Genesis Chin / Dip Assist':  {beg:8,  int:6,   adv:4,   unit:'level'},
  'Genesis Multiplane Chest':   {beg:20, int:30,  adv:45,  unit:'lb'},
  'Dumbbell Bench Press':       {beg:10, int:15,  adv:22,  unit:'lb cada'},
  'Genesis Multiplane Shoulder':{beg:15, int:25,  adv:35,  unit:'lb'},
  'Genesis Biceps':             {beg:15, int:20,  adv:30,  unit:'lb'},
  'Genesis Biceps Preacher':    {beg:15, int:20,  adv:28,  unit:'lb'},
  'Genesis Triceps':            {beg:20, int:35,  adv:50,  unit:'lb'},
  'Genesis Triceps Seated':     {beg:20, int:30,  adv:45,  unit:'lb'},
  'Leg Extension':              {beg:55, int:80,  adv:110, unit:'lb'},
  'Leg Curl':                   {beg:40, int:55,  adv:75,  unit:'lb'},
  'Prone Leg Curl':             {beg:40, int:60,  adv:80,  unit:'lb'},
  'Genesis Total Quad / Hip':   {beg:12, int:17,  adv:25,  unit:'lb'},
  'Genesis Total Glute / Ham':  {beg:15, int:20,  adv:30,  unit:'lb'},
  'Inner Thigh':                {beg:90, int:130, adv:160, unit:'lb'},
  'Outer Thigh':                {beg:90, int:130, adv:160, unit:'lb'},
  'Genesis Multiplane Calf':    {beg:120,int:180, adv:220, unit:'lb'},
  'Decline Sit-up':             {beg:0,  int:0,   adv:0,   unit:'corpo'},
};

// Full body workout templates (exercises per workout)
const WORKOUT_TEMPLATES = {
  full:[
    ['Precor Pulldown 304','Genesis Lat','Precor Low Row','Leg Extension','Leg Curl','Genesis Multiplane Shoulder','Genesis Biceps','Genesis Triceps','Dumbbell Bench Press','Inner Thigh','Outer Thigh','Decline Sit-up'],
    ['Genesis Chin / Dip Assist','Genesis Multiplane Chest','Precor Low Row','Leg Extension','Prone Leg Curl','Genesis Multiplane Shoulder','Genesis Biceps Preacher','Genesis Triceps Seated','Inner Thigh','Outer Thigh','Decline Sit-up'],
    ['Genesis Lat','Precor Pulldown 304','Precor Seated Row','Genesis Total Quad / Hip','Genesis Total Glute / Ham','Genesis Multiplane Shoulder','Genesis Biceps','Genesis Triceps','Genesis Multiplane Calf','Genesis Dual Cable','Decline Sit-up'],
    ['Genesis Multiplane Chest','Genesis Chin / Dip Assist','Precor Seated Row','Leg Extension','Prone Leg Curl','Genesis Multiplane Shoulder','Genesis Biceps Preacher','Genesis Triceps Seated','Genesis Multiplane Calf','Inner Thigh','Decline Sit-up'],
    ['Precor Pulldown 304','Genesis Multiplane Chest','Precor Low Row','Genesis Total Quad / Hip','Genesis Total Glute / Ham','Genesis Multiplane Shoulder','Genesis Biceps','Genesis Triceps','Genesis Dual Cable','Outer Thigh','Decline Sit-up'],
  ],
  upper:[
    ['Precor Pulldown 304','Genesis Lat','Precor Low Row','Genesis Multiplane Shoulder','Genesis Biceps','Genesis Triceps','Dumbbell Bench Press','Genesis Dual Cable','Decline Sit-up'],
    ['Genesis Chin / Dip Assist','Genesis Multiplane Chest','Precor Seated Row','Genesis Multiplane Shoulder','Genesis Biceps Preacher','Genesis Triceps Seated','Genesis Dual Cable','Decline Sit-up'],
    ['Genesis Lat','Precor Pulldown 304','Genesis Multiplane Chest','Genesis Multiplane Shoulder','Genesis Biceps','Genesis Triceps','Precor Low Row','Decline Sit-up'],
    ['Precor Seated Row','Genesis Chin / Dip Assist','Dumbbell Bench Press','Genesis Multiplane Shoulder','Genesis Biceps Preacher','Genesis Triceps Seated','Genesis Dual Cable','Decline Sit-up'],
    ['Precor Pulldown 304','Genesis Multiplane Chest','Precor Low Row','Genesis Multiplane Shoulder','Genesis Biceps','Genesis Triceps','Genesis Dual Cable','Decline Sit-up'],
  ],
  lower:[
    ['Leg Extension','Leg Curl','Inner Thigh','Outer Thigh','Genesis Multiplane Calf','Genesis Total Quad / Hip','Genesis Total Glute / Ham','Decline Sit-up'],
    ['Leg Extension','Prone Leg Curl','Inner Thigh','Outer Thigh','Genesis Multiplane Calf','Genesis Total Quad / Hip','Genesis Total Glute / Ham','Decline Sit-up'],
    ['Genesis Total Quad / Hip','Genesis Total Glute / Ham','Leg Extension','Leg Curl','Genesis Multiplane Calf','Inner Thigh','Outer Thigh','Decline Sit-up'],
    ['Leg Extension','Prone Leg Curl','Genesis Total Quad / Hip','Genesis Total Glute / Ham','Genesis Multiplane Calf','Inner Thigh','Outer Thigh','Decline Sit-up'],
    ['Genesis Total Quad / Hip','Genesis Total Glute / Ham','Leg Extension','Leg Curl','Genesis Multiplane Calf','Inner Thigh','Outer Thigh','Decline Sit-up'],
  ],
};

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const S={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
  user:()=>S.get('ga_user',null),
  logs:()=>S.get('ga_logs',[]),
  streak:()=>S.get('ga_streak',0),
  workouts:()=>S.get('ga_workouts',null),
  saveWorkouts:w=>S.set('ga_workouts',w),
  addLog:l=>{const logs=S.logs();logs.push(l);S.set('ga_logs',logs);},
};
const $=id=>document.getElementById(id);
const app=document.getElementById('app');
const fmt=iso=>new Date(iso).toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'});
const wLabel=ex=>ex.weight>0?ex.weight+' '+ex.unit:'Corpo livre';

// ─── WEIGHT ESTIMATION ───────────────────────────────────────────────────────
// Estimates starting weight based on level + body weight scaling
function estimateWeight(exName, level, bodyWeightKg) {
  const base = BASE_WEIGHTS[exName];
  if(!base) return {weight:0, unit:'corpo'};
  if(base.unit==='corpo') return {weight:0, unit:'corpo'};
  if(base.unit==='level') return {weight:base[level]||base.int, unit:'level'};

  const bw = bodyWeightKg || 80;
  const refBW = 80; // reference body weight for base values
  const scale = Math.sqrt(bw / refBW); // square root scaling (strength doesn't scale linearly)

  let w = (base[level] || base.int) * scale;
  // Round to nearest 2.5
  w = Math.round(w / 2.5) * 2.5;
  return {weight: w, unit: base.unit};
}

// Build workout objects from template + estimates
function buildWorkouts(focus, numDays, level, bodyWeightKg) {
  const templates = WORKOUT_TEMPLATES[focus] || WORKOUT_TEMPLATES.full;
  const result = {};
  WORKOUT_KEYS.slice(0, numDays).forEach((key, i) => {
    const exNames = templates[i % templates.length];
    result[key] = exNames.map(name => {
      const meta = EX_LIBRARY[name] || {type:'upper',group:'other'};
      const est = estimateWeight(name, level, bodyWeightKg);
      return {
        name,
        weight: est.weight,
        unit: est.unit,
        type: meta.type,
        group: meta.group,
        caution: meta.caution || null,
      };
    });
  });
  return result;
}

// ─── SCHEDULE ────────────────────────────────────────────────────────────────
// Returns {dayIndex: 'WorkoutKey'} from user's schedule config
function getScheduleMap(user) {
  if(user.schedule) return user.schedule; // custom schedule
  // fallback defaults
  const defaults = {2:[1,4],3:[1,3,5],4:[1,2,4,5],5:[1,2,3,4,5]};
  const days = defaults[parseInt(user.trainDays)||3] || defaults[3];
  const map = {};
  days.forEach((d,i)=>{ map[d]=WORKOUT_KEYS[i]; });
  return map;
}

// ─── PROGRESSION ─────────────────────────────────────────────────────────────
function getSuggestion(name, type, weight) {
  const thr = type==='legs' ? 14 : 12;
  const logs = S.logs();
  const sessions = [];
  for(let i=logs.length-1; i>=0 && sessions.length<2; i--) {
    const ex=(logs[i].exercises||[]).find(e=>e.name===name&&e.weight===weight);
    if(ex && ex.reps.length>=2) sessions.push(ex);
  }
  if(sessions.length<2) return null;
  const ok = s => s.reps[1]>=thr && (s.reps[2]==null||s.reps[2]>=thr);
  return (ok(sessions[0])&&ok(sessions[1])) ? 'up' : null;
}

// Auto-adjust weight after first session
function autoAdjustAfterSession(exercises, sessionData) {
  const wk = S.workouts();
  if(!wk) return;
  let changed = false;
  sessionData.forEach(sd => {
    if(!sd || sd.reps.length < 2) return;
    const r1=sd.reps[0]||0, r2=sd.reps[1]||0, r3=sd.reps[2]||0;
    const avg23 = r3>0 ? (r2+r3)/2 : r2;
    // Find exercise in workouts
    Object.keys(wk).forEach(key => {
      const ex = wk[key].find(e=>e.name===sd.name);
      if(!ex || ex.unit==='corpo' || ex.unit==='level') return;
      let newW = ex.weight;
      if(avg23 >= 18) newW = ex.weight + 10;       // very easy → +10
      else if(avg23 >= 14) newW = ex.weight + 5;   // easy → +5
      else if(avg23 >= 12) newW = ex.weight + 2.5; // good → +2.5
      else if(avg23 < 6)   newW = ex.weight - 5;   // too hard → -5
      else if(avg23 < 8)   newW = ex.weight - 2.5; // hard → -2.5
      if(newW !== ex.weight) { ex.weight = Math.max(0, newW); changed = true; }
    });
  });
  if(changed) S.saveWorkouts(wk);
  return changed;
}

// ─── BOTTOM NAV ───────────────────────────────────────────────────────────────
function bnav(active) {
  return `<div class="bnav">
    <button class="bnav-btn ${active==='home'?'on':''}" onclick="renderDashboard('home')"><span class="ic">🏠</span><span class="lb">Inicio</span></button>
    <button class="bnav-btn ${active==='history'?'on':''}" onclick="renderDashboard('history')"><span class="ic">📋</span><span class="lb">Historico</span></button>
    <button class="bnav-btn ${active==='weights'?'on':''}" onclick="renderDashboard('weights')"><span class="ic">⚖️</span><span class="lb">Pesos</span></button>
    <button class="bnav-btn ${active==='profile'?'on':''}" onclick="renderProfile()"><span class="ic">👤</span><span class="lb">Perfil</span></button>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════════════
// ONBOARDING — 5 steps
// ═══════════════════════════════════════════════════════════════════════════
let OB = {}; // onboarding state

function renderOnboarding(step) {
  OB.step = step || 1;
  const steps = {1:obStep1, 2:obStep2, 3:obStep3, 4:obStep4, 5:obStep5};
  app.innerHTML = (steps[OB.step] || obStep1)();
}

function obProgress(step) {
  return `<div style="display:flex;gap:6px;margin-bottom:32px;">
    ${[1,2,3,4,5].map(i=>`
      <div style="flex:1;height:3px;border-radius:4px;background:${i<=step?'var(--accent)':'var(--card2)'};transition:background .3s;"></div>`).join('')}
  </div>`;
}

// ── Step 1: Name + Body ───────────────────────────────────────────────────
function obStep1() {
  return `<div class="ob-step fade-in pt-safe">
    ${obProgress(1)}
    <div style="margin-bottom:32px;">
      <p style="font-size:13px;color:var(--muted);font-weight:500;margin-bottom:8px;">PASSO 1 DE 5</p>
      <h1 style="font-size:32px;font-weight:800;letter-spacing:-.03em;line-height:1.15;margin-bottom:10px;">Vamos te<br>conhecer. 👋</h1>
      <p style="color:var(--subtle);font-size:15px;line-height:1.6;">Essas informacoes ajudam a estimar seus pesos iniciais com precisao.</p>
    </div>

    <div style="display:flex;flex-direction:column;gap:14px;margin-bottom:28px;">
      <div>
        <label style="display:block;color:var(--subtle);font-size:13px;font-weight:500;margin-bottom:8px;">Seu nome</label>
        <input id="ob1_name" class="inp" type="text" placeholder="Rafael" autocomplete="given-name" value="${OB.name||''}"/>
      </div>
      <div style="display:flex;gap:10px;">
        <div style="flex:1;">
          <label style="display:block;color:var(--subtle);font-size:13px;font-weight:500;margin-bottom:8px;">Altura (cm)</label>
          <input id="ob1_height" class="inp" type="number" min="140" max="220" placeholder="175" style="text-align:center;" value="${OB.height||''}"/>
        </div>
        <div style="flex:1;">
          <label style="display:block;color:var(--subtle);font-size:13px;font-weight:500;margin-bottom:8px;">Peso (kg)</label>
          <input id="ob1_weight" class="inp" type="number" min="40" max="200" placeholder="80" style="text-align:center;" value="${OB.weight||''}"/>
        </div>
      </div>
      <div>
        <label style="display:block;color:var(--subtle);font-size:13px;font-weight:500;margin-bottom:10px;">Sexo biologico <span style="color:var(--muted);font-size:11px;">(afeta estimativa de forca)</span></label>
        <div style="display:flex;gap:8px;">
          ${[['M','Masculino'],['F','Feminino']].map(([v,l])=>`
            <button onclick="OB.sex='${v}';document.querySelectorAll('.sex-btn').forEach(b=>b.classList.remove('on'));this.classList.add('on');"
              class="sel-pill sex-btn ${OB.sex===v?'on':''}" style="flex:1;">
              <p style="font-size:14px;font-weight:600;color:var(--text);">${l}</p>
            </button>`).join('')}
        </div>
      </div>
    </div>

    <button class="btn btn-dark" onclick="obNext1()">Continuar →</button>
  </div>`;
}
window.obNext1 = function() {
  const name = $('ob1_name').value.trim();
  const height = parseInt($('ob1_height').value);
  const weight = parseInt($('ob1_weight').value);
  if(!name) { $('ob1_name').focus(); return; }
  if(!height || height<140 || height>220) { $('ob1_height').focus(); return; }
  if(!weight || weight<40 || weight>200) { $('ob1_weight').focus(); return; }
  if(!OB.sex) { alert('Selecione o sexo biologico'); return; }
  OB.name=name; OB.height=height; OB.weight=weight;
  renderOnboarding(2);
};

// ── Step 2: Level + Goal ──────────────────────────────────────────────────
function obStep2() {
  return `<div class="ob-step fade-in pt-safe">

window.toggleDay = function(i) {
  if(!OB.selectedDays) OB.selectedDays=[];
  const idx = OB.selectedDays.indexOf(i);
  if(idx>=0) {
    if(OB.selectedDays.length<=1) return; // min 1 day
    OB.selectedDays.splice(idx,1);
  } else {
    if(OB.selectedDays.length>=5) return; // max 5 days
    OB.selectedDays.push(i);
    OB.selectedDays.sort((a,b)=>a-b);
  }
  // Re-render day picker
  OB.selectedDays.forEach((d,i)=>{
    const cell=$('dc_'+d); const lbl=$('dc_lbl_'+d);
    if(cell){cell.classList.add('on');cell.querySelector('span').style.color='#fff';}
    if(lbl){lbl.textContent=WORKOUT_KEYS[i];lbl.style.color='rgba(255,255,255,.7)';}
  });
  [0,1,2,3,4,5,6].filter(d=>!OB.selectedDays.includes(d)).forEach(d=>{
    const cell=$('dc_'+d); const lbl=$('dc_lbl_'+d);
    if(cell){cell.classList.remove('on');cell.querySelector('span').style.color='var(--subtle)';}
    if(lbl){lbl.textContent='';lbl.style.color='var(--muted)';}
  });
  const sum=$('day-summary');
  if(sum) sum.innerHTML=`<div class="card-flat"><p style="font-size:13px;color:var(--subtle);">${OB.selectedDays.length} dias de treino: ${OB.selectedDays.map((d,i)=>DAY_NAMES[d]+' (Treino '+WORKOUT_KEYS[i]+')').join(', ')}</p></div>`;
};

function renderDashboard(tab) {
  const u=S.user(), streak=S.streak(), logs=S.logs();
  const today=new Date().getDay();
  const schedMap=getScheduleMap(u);
  const scheduled=schedMap[today];
  const weekStart=new Date(); weekStart.setDate(weekStart.getDate()-weekStart.getDay()); weekStart.setHours(0,0,0,0);
  const weekCount=logs.filter(l=>new Date(l.date)>=weekStart).length;
  const lastLog=logs.length?logs[logs.length-1]:null;
  const t=tab||'home';

  let content='';
  if(t==='home')    content=homeTab(u,scheduled,streak,weekCount,lastLog,today,schedMap);
  if(t==='history') content=historyTab(logs);
  if(t==='weights') content=weightsTab(u,schedMap);

  app.innerHTML=`
  <div class="fade-in">
    <div class="px pt-safe" style="padding-bottom:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <p style="color:var(--muted);font-size:13px;font-weight:500;">Ola, ${u.name} 👋</p>
          <p style="font-size:22px;font-weight:800;letter-spacing:-.02em;margin-top:1px;">${DAY_NAMES[today]}</p>
        </div>
        ${streak>0?`<div style="background:var(--orange-light);border-radius:24px;padding:8px 14px;display:flex;align-items:center;gap:6px;"><span style="font-size:16px;">🔥</span><span style="font-size:14px;font-weight:700;color:var(--orange);">${streak} dias</span></div>`:''}
      </div>
    </div>
    <div class="px" style="padding-bottom:80px;">${content}</div>
    ${bnav(t)}
  </div>`;
}

// AUTO REP COUNTER
// ═══════════════════════════════════════════════════════════════════════════
const EX_PROFILES={'Genesis Biceps':'curl','Genesis Biceps Preacher':'curl','Genesis Triceps':'curl','Genesis Triceps Seated':'curl','Genesis Multiplane Chest':'press','Genesis Multiplane Shoulder':'press','Dumbbell Bench Press':'press','Genesis Chin / Dip Assist':'press','Precor Pulldown 304':'pull','Genesis Lat':'pull','Precor Low Row':'pull','Precor Seated Row':'pull','Genesis Dual Cable':'pull','Leg Extension':'leg','Leg Curl':'leg','Prone Leg Curl':'leg','Inner Thigh':'leg','Outer Thigh':'leg','Genesis Total Quad / Hip':'leg','Genesis Total Glute / Ham':'leg','Genesis Multiplane Calf':'leg','Decline Sit-up':'core'};
function getACThresholds(exName){
  const u=S.user();const h=u?.height||175;const ratio=175/h;
  const bases={curl:{up:13,down:8,cd:350},press:{up:11,down:7,cd:400},pull:{up:10,down:6.5,cd:450},leg:{up:9,down:5.5,cd:500},core:{up:8,down:5,cd:600}};
  const b=bases[EX_PROFILES[exName]||'pull'];
  return{upThr:+(b.up*ratio).toFixed(1),downThr:+(b.down*ratio).toFixed(1),cooldown:b.cd,profile:EX_PROFILES[exName]||'pull'};
}
let acState={active:false,handler:null,reps:0,phase:'rest',smoothed:0,cooldown:false,cooldownTimer:null,thr:null};
const AC_ALPHA=0.25;

window.openAutoCount=function(){
  const exName=(typeof exercises!=='undefined'&&typeof cur!=='undefined')?exercises[cur]?.name||'':'';
  const thr=getACThresholds(exName);
  const u=S.user();const armCm=u?.height?Math.round(u.height*0.36):null;
  acState={active:false,handler:null,reps:0,phase:'rest',smoothed:0,cooldown:false,cooldownTimer:null,thr};
  const ov=document.createElement('div');ov.className='overlay fade-in';ov.id='ac-ov';
  ov.innerHTML=`<div class="sheet" style="text-align:center;">
    <div class="sheet-handle"></div>
    <p style="font-size:20px;font-weight:800;margin-bottom:4px;">Contador automatico</p>
    <p style="color:var(--subtle);font-size:13px;margin-bottom:10px;">Segure o celular no punho e faca o movimento completo</p>
    ${exName?`<div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:16px;"><span class="chip chip-accent">${thr.profile}</span>${armCm?`<span class="chip" style="background:var(--card2);color:var(--subtle);">braco ~${armCm}cm</span>`:''}</div>`:''}
    <div style="position:relative;width:120px;height:120px;margin:0 auto 16px;">
      <svg width="120" height="120" style="position:absolute;top:0;left:0;transform:rotate(-90deg);">
        <circle cx="60" cy="60" r="52" fill="none" stroke="var(--card2)" stroke-width="7"/>
        <circle id="ac-ring" cx="60" cy="60" r="52" fill="none" stroke="var(--accent)" stroke-width="7" stroke-dasharray="327" stroke-dashoffset="327" stroke-linecap="round" style="transition:stroke-dashoffset .25s;"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <span id="ac-num" style="font-size:48px;font-weight:800;line-height:1;">0</span>
        <span style="color:var(--muted);font-size:11px;">reps</span>
      </div>
    </div>
    <div style="height:6px;background:var(--card2);border-radius:4px;margin-bottom:16px;overflow:hidden;position:relative;">
      <div id="ac-level" style="height:100%;background:var(--accent);width:0%;border-radius:4px;transition:width .08s;"></div>
    </div>
    <p id="ac-status" style="color:var(--muted);font-size:13px;margin-bottom:20px;">Pressione Iniciar</p>
    <div style="display:flex;gap:10px;margin-bottom:10px;">
      <button id="ac-go" class="btn btn-accent" onclick="acStart()">Iniciar</button>
      <button id="ac-stop" class="btn btn-ghost" style="display:none;" onclick="acStop()">Parar</button>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-ghost" onclick="acCancel()">Cancelar</button>
      <button id="ac-use" class="btn btn-dark" style="display:none;" onclick="acUse()">Usar resultado</button>
    </div>
  </div>`;
  ov.onclick=e=>{if(e.target===ov)acCancel();};
  document.body.appendChild(ov);
};
window.acStart=function(){
  acState.active=true;acState.reps=0;acState.phase='rest';acState.smoothed=0;
  const thr=acState.thr;
  $('ac-go').style.display='none';$('ac-stop').style.display='block';
  $('ac-status').textContent='Movendo! Faca os movimentos completos...';
  $('ac-status').style.color='var(--accent)';
  function onMotion(e){
    if(!acState.active)return;
    const a=e.accelerationIncludingGravity||e.acceleration||{};
    const raw=Math.sqrt((a.x||0)**2+(a.y||0)**2+(a.z||0)**2);
    acState.smoothed=AC_ALPHA*raw+(1-AC_ALPHA)*acState.smoothed;
    const mag=acState.smoothed;
    const lvl=$('ac-level');if(lvl)lvl.style.width=Math.min(100,mag/25*100)+'%';
    if(acState.phase==='rest'&&mag>thr.upThr&&!acState.cooldown){acState.phase='active';}
    else if(acState.phase==='active'&&mag<thr.downThr){
      acState.phase='rest';
      if(!acState.cooldown){
        acState.reps++;acState.cooldown=true;
        clearTimeout(acState.cooldownTimer);
        acState.cooldownTimer=setTimeout(()=>{acState.cooldown=false;},thr.cooldown);
        const el=$('ac-num'),ring=$('ac-ring');
        if(el){el.textContent=acState.reps;el.style.color='var(--green)';setTimeout(()=>{if(el)el.style.color='var(--text)';},300);}
        if(ring){ring.setAttribute('stroke-dashoffset',327-Math.min(acState.reps/20,1)*327);}
      }
    }
  }
  acState.handler=onMotion;
  if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
    DeviceMotionEvent.requestPermission().then(r=>{if(r==='granted')window.addEventListener('devicemotion',onMotion);else{$('ac-status').textContent='Permissao negada.';$('ac-status').style.color='var(--red)';}}).catch(()=>window.addEventListener('devicemotion',onMotion));
  }else{window.addEventListener('devicemotion',onMotion);}
};
window.acStop=function(){
  acState.active=false;if(acState.handler)window.removeEventListener('devicemotion',acState.handler);
  $('ac-stop').style.display='none';
  $('ac-status').textContent=`${acState.reps} reps. Use ou cancele.`;$('ac-status').style.color='var(--subtle)';
  const ub=$('ac-use');if(ub){ub.style.display='block';ub.textContent=`Usar ${acState.reps} reps`;}
  const lvl=$('ac-level');if(lvl)lvl.style.width='0%';
};
window.acUse=function(){const r=acState.reps;acCancel();if(r>0)window.addSet(r);};
window.acCancel=function(){acState.active=false;if(acState.handler)window.removeEventListener('devicemotion',acState.handler);$('ac-ov')?.remove();};

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;">
      <div class="stat-box" style="text-align:center;"><p style="font-size:20px;font-weight:800;">${S.streak()}</p><p class="label" style="margin-top:2px;">Sequencia</p></div>
      <div class="stat-box" style="text-align:center;"><p style="font-size:20px;font-weight:800;">${S.logs().length}</p><p class="label" style="margin-top:2px;">Treinos</p></div>
      <div class="stat-box" style="text-align:center;"><p style="font-size:20px;font-weight:800;">${Math.round(u.height*0.36)}cm</p><p class="label" style="margin-top:2px;">Braco</p></div>
    </div>

    <!-- Edit profile -->
    <div class="card" style="margin-bottom:12px;">
      <div style="padding:14px 16px 0;"><p class="label" style="margin-bottom:14px;">Editar perfil</p></div>
      <div style="padding:0 16px 16px;display:flex;flex-direction:column;gap:12px;">
        <div><label style="display:block;color:var(--subtle);font-size:13px;font-weight:500;margin-bottom:6px;">Nome</label><input id="p_name" class="inp" value="${u.name}"/></div>
        <div style="display:flex;gap:10px;">
          <div style="flex:1;"><label style="display:block;color:var(--subtle);font-size:13px;font-weight:500;margin-bottom:6px;">Altura (cm)</label><input id="p_height" class="inp" type="number" value="${u.height||175}" style="text-align:center;"/></div>
          <div style="flex:1;"><label style="display:block;color:var(--subtle);font-size:13px;font-weight:500;margin-bottom:6px;">Peso (kg)</label><input id="p_weight" class="inp" type="number" value="${u.weight||80}" style="text-align:center;"/></div>
        </div>
        <div><label style="display:block;color:var(--subtle);font-size:13px;font-weight:500;margin-bottom:6px;">Foco do treino</label>
          <select id="p_focus" class="inp">
            ${[['full','Full Body'],['upper','Upper Body'],['lower','Lower Body']].map(([v,l])=>`<option value="${v}" ${u.focus===v?'selected':''}>${l}</option>`).join('')}
          </select>
        </div>
        <button class="btn btn-dark" onclick="saveProfile()">Salvar alteracoes</button>
      </div>
    </div>

    <!-- Schedule -->
    <div class="card" style="margin-bottom:12px;">
      <div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
        <p style="font-size:15px;font-weight:700;">Agenda de treinos</p>
        <button onclick="editSchedule()" style="padding:6px 12px;background:var(--accent-light);border:none;border-radius:8px;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;">Editar</button>
      </div>
      <div style="padding:12px 16px;">
        ${Object.entries(schedMap).sort(([a],[b])=>a-b).map(([d,k])=>`
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:14px;color:var(--subtle);">${DAY_NAMES[d]}</span>
            <span style="font-size:14px;font-weight:700;">Treino ${k}</span>
          </div>`).join('')}
      </div>
    </div>

    <div class="card-sm" style="margin-bottom:10px;">
      <button onclick="resetWk()" style="width:100%;padding:10px;background:transparent;border:none;color:var(--orange);font-size:14px;font-weight:600;cursor:pointer;text-align:left;">Resetar pesos para estimativa inicial</button>
    </div>
    <div class="card-sm">
      <button onclick="clearAll()" style="width:100%;padding:10px;background:transparent;border:none;color:var(--muted);font-size:14px;cursor:pointer;text-align:left;">Apagar todos os dados e recomecar</button>
    </div>
  </div>
  ${bnav('profile')}`;
};

window.saveProfile=function(){
  const u=S.user();
  u.name=$('p_name').value.trim()||u.name;
  u.height=parseInt($('p_height').value)||u.height;
  u.weight=parseInt($('p_weight').value)||u.weight;
  u.focus=$('p_focus').value;
  S.set('ga_user',u);renderProfile();
};

window.editSchedule=function(){
  // Re-run step 3 of onboarding inline
  const u=S.user();
  OB={...u, selectedDays: Object.keys(getScheduleMap(u)).map(Number)};
  const ov=document.createElement('div');ov.className='overlay fade-in';ov.id='sched-ov';
  ov.innerHTML=`<div class="sheet" style="max-height:85vh;overflow-y:auto;">
    <div class="sheet-handle"></div>
    <p style="font-size:18px;font-weight:800;margin-bottom:4px;">Editar agenda</p>
    <p style="color:var(--subtle);font-size:13px;margin-bottom:16px;">Selecione os dias de treino</p>
    <div style="display:flex;gap:6px;margin-bottom:16px;">
      ${DAY_SHORT.map((d,i)=>`
        <div class="day-cell ${OB.selectedDays.includes(i)?'on':''}" onclick="toggleDay(${i})" id="dc_${i}">
          <span style="font-size:12px;font-weight:700;color:${OB.selectedDays.includes(i)?'#fff':'var(--subtle)'};">${d}</span>
          <span style="font-size:9px;color:${OB.selectedDays.includes(i)?'rgba(255,255,255,.7)':'var(--muted)'};" id="dc_lbl_${i}">${OB.selectedDays.includes(i)?WORKOUT_KEYS[OB.selectedDays.indexOf(i)]:''}</span>
        </div>`).join('')}
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="$('sched-ov').remove()">Cancelar</button>
      <button class="btn btn-dark" style="flex:1;" onclick="saveSchedule()">Salvar</button>
    </div>
  </div>`;
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  document.body.appendChild(ov);
};
window.saveSchedule=function(){
  const u=S.user();
  const schedule={};
  OB.selectedDays.forEach((d,i)=>{schedule[d]=WORKOUT_KEYS[i];});
  u.schedule=schedule;u.trainDays=OB.selectedDays.length;
  S.set('ga_user',u);$('sched-ov')?.remove();renderProfile();
};

window.resetWk=function(){
  if(confirm('Resetar pesos para estimativa inicial?')){
    const u=S.user();
    const wk=buildWorkouts(u.focus||'full',u.trainDays||3,u.level||'int',u.weight||80);
    S.saveWorkouts(wk);renderProfile();
  }
};
window.clearAll=function(){
  if(confirm('Apagar tudo e recomecar o onboarding?')){localStorage.clear();OB={};renderOnboarding();}
};

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
(function init(){
  const u=S.user();
  if(!u){OB={};renderOnboarding();}
  else if(!S.workouts()){
    // Has user but no workouts — rebuild
    const wk=buildWorkouts(u.focus||'full',u.trainDays||3,u.level||'int',u.weight||80);
    S.saveWorkouts(wk);renderDashboard();
  }
  else{renderDashboard();}
})();
</script>
</body>
</html>
