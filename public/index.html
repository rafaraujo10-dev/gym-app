<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d0d0f" />
  <link rel="manifest" href="/manifest.json" />
  <title>GymApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0d0f; color: #fff; }
    button { font-family: inherit; }
    input, select { font-family: inherit; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const WORKOUTS = {
      A: [
        { name: 'Precor Pulldown 304', weight: '70 lb' },
        { name: 'Genesis Lat', weight: '60 lb' },
        { name: 'Precor Low Row', weight: '80 lb' },
        { name: 'Leg Extension', weight: '80 lb' },
        { name: 'Leg Curl', weight: '55 lb' },
        { name: 'Genesis Multiplane Shoulder', weight: '25 lb' },
        { name: 'Genesis Biceps', weight: '20 lb' },
        { name: 'Genesis Triceps', weight: '35 lb' },
        { name: 'Dumbbell Bench Press', weight: '15 lb cada' },
        { name: 'Inner Thigh', weight: '130 lb' },
        { name: 'Outer Thigh', weight: '130 lb' },
        { name: 'Decline Sit-up', weight: 'corpo' },
      ],
      B: [
        { name: 'Genesis Chin / Dip Assist', weight: 'Level 6' },
        { name: 'Genesis Multiplane Chest', weight: '30 lb' },
        { name: 'Precor Low Row', weight: '80 lb' },
        { name: 'Leg Extension', weight: '80 lb' },
        { name: 'Prone Leg Curl', weight: '60 lb' },
        { name: 'Genesis Multiplane Shoulder', weight: '25 lb' },
        { name: 'Genesis Biceps Preacher', weight: '20 lb' },
        { name: 'Genesis Triceps Seated', weight: '30 lb' },
        { name: 'Inner Thigh', weight: '130 lb' },
        { name: 'Outer Thigh', weight: '130 lb' },
        { name: 'Decline Sit-up', weight: 'corpo' },
      ],
      C: [
        { name: 'Genesis Lat', weight: '70 lb' },
        { name: 'Precor Pulldown 304', weight: '70 lb' },
        { name: 'Precor Seated Row', weight: '60 lb' },
        { name: 'Genesis Total Quad / Hip', weight: '17.5 lb' },
        { name: 'Genesis Total Glute / Ham', weight: '20 lb' },
        { name: 'Genesis Multiplane Shoulder', weight: '25 lb' },
        { name: 'Genesis Biceps', weight: '20 lb' },
        { name: 'Genesis Triceps', weight: '30 lb' },
        { name: 'Genesis Multiplane Calf', weight: '180 lb' },
        { name: 'Genesis Dual Cable', weight: '17 lb' },
        { name: 'Decline Sit-up', weight: 'corpo' },
      ]
    };

    const app = document.getElementById('app');

    function getUser() { return JSON.parse(localStorage.getItem('gymapp_user') || 'null'); }
    function getLogs() { return JSON.parse(localStorage.getItem('gymapp_logs') || '[]'); }
    function getStreak() { return parseInt(localStorage.getItem('gymapp_streak') || '0'); }

    function getWeekCount() {
      const logs = getLogs();
      const now = new Date();
      const startOfWeek = new Date(now);
      startOfWeek.setDate(now.getDate() - now.getDay());
      startOfWeek.setHours(0,0,0,0);
      return logs.filter(l => new Date(l.date) >= startOfWeek).length;
    }

    function init() {
      const user = getUser();
      if (user) renderDashboard();
      else renderOnboarding();
    }

    function renderOnboarding() {
      app.innerHTML = `
        <div style="padding:24px;max-width:480px;margin:0 auto;min-height:100vh;">
          <div style="padding-top:48px;margin-bottom:40px;">
            <p style="color:#888;font-size:13px;margin:0 0 8px;">Bem-vindo ao</p>
            <h1 style="font-size:36px;font-weight:500;margin:0 0 4px;">GymApp</h1>
            <p style="color:#555;font-size:15px;margin:0;">Seu diário de treino inteligente</p>
          </div>
          <div style="background:#1a1a22;border-radius:20px;padding:24px;border:0.5px solid #2a2a35;">
            <p style="color:#888;font-size:11px;margin:0 0 20px;text-transform:uppercase;letter-spacing:0.08em;">Vamos começar</p>
            <label style="display:block;color:#888;font-size:13px;margin-bottom:8px;">Seu nome</label>
            <input id="userName" type="text" placeholder="Ex: Rafael" style="width:100%;padding:14px;background:#111115;border:0.5px solid #2a2a35;border-radius:12px;color:#fff;font-size:16px;margin-bottom:20px;outline:none;" />
            <label style="display:block;color:#888;font-size:13px;margin-bottom:8px;">Dias de treino por semana</label>
            <select id="trainDays" style="width:100%;padding:14px;background:#111115;border:0.5px solid #2a2a35;border-radius:12px;color:#fff;font-size:16px;margin-bottom:20px;outline:none;">
              <option value="2">2 dias</option>
              <option value="3" selected>3 dias</option>
              <option value="4">4 dias</option>
              <option value="5">5 dias</option>
            </select>
            <label style="display:block;color:#888;font-size:13px;margin-bottom:8px;">Tempo por sessão</label>
            <select id="sessionTime" style="width:100%;padding:14px;background:#111115;border:0.5px solid #2a2a35;border-radius:12px;color:#fff;font-size:16px;margin-bottom:28px;outline:none;">
              <option value="30">30 minutos</option>
              <option value="45" selected>45 minutos</option>
              <option value="60">60 minutos</option>
            </select>
            <button onclick="saveOnboarding()" style="width:100%;padding:16px;background:#fff;border:none;border-radius:12px;color:#0d0d0f;font-size:16px;font-weight:500;cursor:pointer;">Começar →</button>
          </div>
        </div>`;
    }

    window.saveOnboarding = function() {
      const name = document.getElementById('userName').value.trim();
      if (!name) { alert('Coloca seu nome!'); return; }
      localStorage.setItem('gymapp_user', JSON.stringify({
        name,
        trainDays: document.getElementById('trainDays').value,
        sessionTime: document.getElementById('sessionTime').value,
        createdAt: new Date().toISOString()
      }));
      renderDashboard();
    };

    function renderDashboard() {
      const user = getUser();
      const streak = getStreak();
      const days = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
      const dayNames = ['D','S','T','Q','Q','S','S'];
      const today = new Date().getDay();
      const workoutMap = {1:'A', 3:'B', 5:'C'};
      const workoutToday = workoutMap[today];
      const weekCount = getWeekCount();

      app.innerHTML = `
        <div style="padding:24px;max-width:480px;margin:0 auto;min-height:100vh;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;">
            <div>
              <p style="color:#888;font-size:13px;margin:0;">Olá, ${user.name}</p>
              <p style="color:#fff;font-size:20px;font-weight:500;margin:2px 0 0;">${days[today]}</p>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              ${streak > 0 ? `<div style="background:#1a1a22;border-radius:20px;padding:6px 12px;border:0.5px solid #333;display:flex;align-items:center;gap:6px;"><span style="color:#f97316;font-size:13px;">★</span><span style="color:#fff;font-size:13px;font-weight:500;">${streak}</span></div>` : ''}
              <div onclick="resetApp()" style="width:36px;height:36px;border-radius:50%;background:#1a1a22;display:flex;align-items:center;justify-content:center;border:0.5px solid #333;cursor:pointer;font-size:13px;font-weight:500;">${user.name.charAt(0).toUpperCase()}</div>
            </div>
          </div>

          ${workoutToday ? `
            <div style="background:#1a1a22;border-radius:20px;padding:24px;margin-bottom:14px;border:0.5px solid #2a2a35;">
              <p style="color:#888;font-size:11px;margin:0 0 4px;text-transform:uppercase;letter-spacing:0.08em;">Treino de hoje</p>
              <p style="color:#fff;font-size:26px;font-weight:500;margin:0 0 2px;">Treino ${workoutToday}</p>
              <p style="color:#555;font-size:13px;margin:0 0 20px;">${user.sessionTime} min · full body</p>
              <button onclick="startWorkout('${workoutToday}')" style="width:100%;padding:14px;background:#fff;border:none;border-radius:12px;color:#0d0d0f;font-size:15px;font-weight:500;cursor:pointer;">Iniciar treino</button>
            </div>
          ` : `
            <div style="background:#1a1a22;border-radius:20px;padding:24px;margin-bottom:14px;border:0.5px solid #2a2a35;">
              <p style="color:#888;font-size:11px;margin:0 0 4px;text-transform:uppercase;letter-spacing:0.08em;">Dia de descanso</p>
              <p style="color:#fff;font-size:22px;font-weight:500;margin:0 0 2px;">Recuperação ativa</p>
              <p style="color:#555;font-size:13px;margin:0;">Alongamento ou caminhada leve</p>
            </div>
          `}

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
            <div style="background:#1a1a22;border-radius:14px;padding:16px;border:0.5px solid #2a2a35;">
              <p style="color:#888;font-size:10px;margin:0 0 6px;text-transform:uppercase;letter-spacing:0.08em;">Sequência</p>
              <p style="color:#fff;font-size:22px;font-weight:500;margin:0;">${streak}<span style="font-size:13px;color:#888;font-weight:400;"> dias</span></p>
            </div>
            <div style="background:#1a1a22;border-radius:14px;padding:16px;border:0.5px solid #2a2a35;">
              <p style="color:#888;font-size:10px;margin:0 0 6px;text-transform:uppercase;letter-spacing:0.08em;">Esta semana</p>
              <p style="color:#fff;font-size:22px;font-weight:500;margin:0;">${weekCount}<span style="font-size:13px;color:#888;font-weight:400;"> / ${user.trainDays}</span></p>
            </div>
          </div>

          <div style="background:#1a1a22;border-radius:14px;padding:16px;border:0.5px solid #2a2a35;">
            <p style="color:#888;font-size:11px;margin:0 0 12px;text-transform:uppercase;letter-spacing:0.08em;">Semana</p>
            <div style="display:flex;gap:6px;">
              ${dayNames.map((d, i) => {
                const isToday = i === today;
                const isTrainDay = [1,3,5].includes(i);
                const isPast = i < today && isTrainDay;
                return `<div style="flex:1;aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;
                  background:${isToday ? '#fff' : isPast ? '#0f2318' : '#111115'};
                  color:${isToday ? '#0d0d0f' : isPast ? '#4ade80' : '#444'};
                  border:0.5px solid ${isToday ? 'transparent' : isPast ? '#1a3d28' : '#1a1a22'};">${d}</div>`;
              }).join('')}
            </div>
          </div>
        </div>`;
    }

    window.startWorkout = function(key) {
      let currentEx = 0;
      let sets = {};
      const exercises = WORKOUTS[key];

      function render() {
        const ex = exercises[currentEx];
        const exSets = sets[currentEx] || [];
        const isLast = currentEx === exercises.length - 1;
        const progress = Math.round(((currentEx + 1) / exercises.length) * 100);

        app.innerHTML = `
          <div style="padding:24px;max-width:480px;margin:0 auto;min-height:100vh;">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:28px;">
              <button onclick="goBack()" style="width:36px;height:36px;border-radius:50%;background:#1a1a22;border:0.5px solid #333;color:#888;font-size:18px;cursor:pointer;">←</button>
              <div style="flex:1;">
                <div style="background:#1a1a22;border-radius:20px;height:4px;overflow:hidden;">
                  <div style="background:#fff;height:4px;width:${progress}%;"></div>
                </div>
                <p style="color:#555;font-size:11px;margin:5px 0 0;text-align:right;">${currentEx + 1} / ${exercises.length}</p>
              </div>
            </div>

            <p style="color:#888;font-size:11px;margin:0 0 4px;text-transform:uppercase;letter-spacing:0.08em;">Treino ${key}</p>
            <p style="color:#fff;font-size:24px;font-weight:500;margin:0 0 4px;">${ex.name}</p>
            <p style="color:#555;font-size:14px;margin:0 0 28px;">${ex.weight}</p>

            <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:28px;">
              ${[0,1,2].map(i => {
                const rep = exSets[i];
                const isActive = i === exSets.length;
                return `<div style="background:#1a1a22;border-radius:14px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border:0.5px solid ${rep !== undefined ? '#2a3a2a' : isActive ? '#3a3a4a' : '#1a1a22'};">
                  <span style="color:#888;font-size:14px;">Série ${i+1}</span>
                  ${rep !== undefined ? `<span style="color:#4ade80;font-size:16px;font-weight:500;">${rep} reps</span>`
                    : isActive ? `<span style="color:#555;font-size:13px;">registrar agora</span>`
                    : `<span style="color:#333;font-size:13px;">—</span>`}
                </div>`;
              }).join('')}
            </div>

            ${exSets.length < 3 ? `
              <p style="color:#888;font-size:13px;margin:0 0 12px;text-align:center;">Série ${exSets.length + 1} — quantas reps?</p>
              <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px;">
                ${[6,8,10,12,14,15,16,18,20,25].map(n =>
                  `<button onclick="addSet(${n})" style="padding:14px 0;background:#1a1a22;border:0.5px solid #2a2a35;border-radius:10px;color:#fff;font-size:15px;font-weight:500;cursor:pointer;">${n}</button>`
                ).join('')}
              </div>
              <div style="display:flex;gap:8px;">
                <input id="customReps" type="number" min="1" max="99" placeholder="outro" style="flex:1;padding:14px;background:#1a1a22;border:0.5px solid #2a2a35;border-radius:10px;color:#fff;font-size:15px;text-align:center;outline:none;" />
                <button onclick="addCustom()" style="padding:14px 20px;background:#1a1a22;border:0.5px solid #2a2a35;border-radius:10px;color:#fff;font-size:15px;cursor:pointer;">OK</button>
              </div>
            ` : `
              <button onclick="nextEx()" style="width:100%;padding:16px;background:#fff;border:none;border-radius:14px;color:#0d0d0f;font-size:16px;font-weight:500;cursor:pointer;margin-bottom:12px;">
                ${isLast ? 'Finalizar treino ✓' : 'Próximo exercício →'}
              </button>
            `}
            <button onclick="skipEx()" style="width:100%;padding:14px;background:transparent;border:0.5px solid #2a2a35;border-radius:14px;color:#555;font-size:14px;cursor:pointer;margin-top:10px;">Pular</button>
          </div>`;
      }

      window.addSet = function(reps) {
        if (!sets[currentEx]) sets[currentEx] = [];
        if (sets[currentEx].length < 3) { sets[currentEx].push(reps); render(); }
      };
      window.addCustom = function() {
        const val = parseInt(document.getElementById('customReps').value);
        if (val > 0) window.addSet(val);
      };
      window.nextEx = function() {
        if (currentEx < exercises.length - 1) { currentEx++; render(); }
        else finishWorkout();
      };
      window.skipEx = function() {
        if (!sets[currentEx]) sets[currentEx] = [];
        window.nextEx();
      };
      window.goBack = function() {
        if (currentEx > 0) { currentEx--; render(); }
        else renderDashboard();
      };

      function finishWorkout() {
        const logs = getLogs();
        logs.push({ date: new Date().toISOString(), workout: key, sets });
        localStorage.setItem('gymapp_logs', JSON.stringify(logs));
        localStorage.setItem('gymapp_streak', getStreak() + 1);

        app.innerHTML = `
          <div style="padding:24px;max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
            <div style="font-size:72px;margin-bottom:24px;">🏆</div>
            <p style="color:#fff;font-size:28px;font-weight:500;margin:0 0 8px;">Treino concluído!</p>
            <p style="color:#888;font-size:15px;margin:0 0 8px;">Treino ${key} · ${exercises.length} exercícios</p>
            <p style="color:#f97316;font-size:
