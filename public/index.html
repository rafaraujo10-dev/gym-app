<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#f5f5f7"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>GymApp</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --card2: #ededf0;
      --border: rgba(0,0,0,.07);
      --text: #111114;
      --subtle: #6e6e80;
      --muted: #aeaebe;
      --accent: #5b4fff;
      --accent-light: #ede9ff;
      --green: #16a34a;
      --green-light: #dcfce7;
      --orange: #ea580c;
      --orange-light: #ffedd5;
      --red: #dc2626;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
    button,input,select{font-family:inherit;}
    #app{max-width:430px;margin:0 auto;padding:0 0 60px;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    @keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.12);}100%{transform:scale(1);}}
    .fade-in{animation:fadeUp .22s ease both;}

    /* Layout */
    .px{padding-left:20px;padding-right:20px;}
    .safe-top{padding-top:env(safe-area-inset-top,20px);}

    /* Cards */
    .card{background:var(--card);border-radius:20px;overflow:hidden;}
    .card-sm{background:var(--card);border-radius:14px;padding:16px;}

    /* Buttons */
    .btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;transition:transform .1s,opacity .15s;}
    .btn:active{transform:scale(.98);opacity:.9;}
    .btn-dark{background:var(--text);color:#fff;}
    .btn-accent{background:var(--accent);color:#fff;}
    .btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--subtle);}
    .btn-light{background:var(--card2);color:var(--text);}

    /* Input */
    .inp{width:100%;padding:14px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:16px;outline:none;}
    .inp:focus{border-color:var(--accent);}
    select.inp{-webkit-appearance:none;}

    /* Tabs — bottom nav */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:50;max-width:430px;margin:0 auto;}
    .nav-btn{flex:1;padding:10px 0 14px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
    .nav-btn span.icon{font-size:22px;}
    .nav-btn span.lbl{font-size:10px;font-weight:500;color:var(--muted);}
    .nav-btn.on span.lbl{color:var(--accent);}
    .nav-btn.on span.icon{filter:none;}

    /* Labels */
    .label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.07em;font-weight:500;}

    /* Chips */
    .chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;}
    .chip-green{background:var(--green-light);color:var(--green);}
    .chip-orange{background:var(--orange-light);color:var(--orange);}
    .chip-accent{background:var(--accent-light);color:var(--accent);}

    /* Set row */
    .set-row{display:flex;align-items:center;padding:14px 16px;gap:12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
    .set-row:active{background:var(--bg);}
    .set-row:last-child{border-bottom:none;}

    /* Rep grid */
    .rep-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
    .rep-btn{padding:14px 0;background:var(--card);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:16px;font-weight:500;cursor:pointer;transition:all .1s;}
    .rep-btn:active{background:var(--accent);color:#fff;border-color:var(--accent);}

    /* Progress */
    .prog-bar{height:3px;background:var(--card2);border-radius:4px;overflow:hidden;}
    .prog-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s ease;}

    /* Overlay */
    .overlay{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;background:rgba(0,0,0,.5);padding:0;}
    .sheet{background:var(--card);border-radius:24px 24px 0 0;padding:20px 20px 40px;width:100%;max-width:430px;}
    .sheet-handle{width:40px;height:4px;background:var(--card2);border-radius:4px;margin:0 auto 20px;}

    /* Exercise list item */
    .ex-item{display:flex;align-items:center;padding:13px 0;border-bottom:1px solid var(--border);gap:12px;cursor:pointer;}
    .ex-item:last-child{border-bottom:none;}
    .ex-dot{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}

    /* Stat box */
    .stat-box{background:var(--card);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:4px;}

    /* Hero gradient for workout card */
    .workout-hero{background:linear-gradient(135deg,#5b4fff 0%,#8b6fff 100%);border-radius:20px;padding:24px;color:#fff;}
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const DEFAULT_WORKOUTS = {
  A:[
    {name:'Precor Pulldown 304',  weight:70,  unit:'lb',     type:'upper'},
    {name:'Genesis Lat',          weight:60,  unit:'lb',     type:'upper'},
    {name:'Precor Low Row',       weight:80,  unit:'lb',     type:'upper'},
    {name:'Leg Extension',        weight:80,  unit:'lb',     type:'legs'},
    {name:'Leg Curl',             weight:55,  unit:'lb',     type:'legs'},
    {name:'Genesis Multiplane Shoulder', weight:25, unit:'lb', type:'upper', caution:'Max 90°'},
    {name:'Genesis Biceps',       weight:20,  unit:'lb',     type:'upper'},
    {name:'Genesis Triceps',      weight:35,  unit:'lb',     type:'upper'},
    {name:'Dumbbell Bench Press', weight:15,  unit:'lb cada',type:'upper'},
    {name:'Inner Thigh',          weight:130, unit:'lb',     type:'legs'},
    {name:'Outer Thigh',          weight:130, unit:'lb',     type:'legs'},
    {name:'Decline Sit-up',       weight:0,   unit:'corpo',  type:'core'},
  ],
  B:[
    {name:'Genesis Chin / Dip Assist', weight:6, unit:'level', type:'upper'},
    {name:'Genesis Multiplane Chest',  weight:30, unit:'lb',   type:'upper'},
    {name:'Precor Low Row',       weight:80,  unit:'lb',     type:'upper'},
    {name:'Leg Extension',        weight:80,  unit:'lb',     type:'legs'},
    {name:'Prone Leg Curl',       weight:60,  unit:'lb',     type:'legs'},
    {name:'Genesis Multiplane Shoulder', weight:25, unit:'lb', type:'upper', caution:'Max 90°'},
    {name:'Genesis Biceps Preacher', weight:20, unit:'lb',   type:'upper'},
    {name:'Genesis Triceps Seated',  weight:30, unit:'lb',   type:'upper'},
    {name:'Inner Thigh',          weight:130, unit:'lb',     type:'legs'},
    {name:'Outer Thigh',          weight:130, unit:'lb',     type:'legs'},
    {name:'Decline Sit-up',       weight:0,   unit:'corpo',  type:'core'},
  ],
  C:[
    {name:'Genesis Lat',          weight:70,  unit:'lb',     type:'upper'},
    {name:'Precor Pulldown 304',  weight:70,  unit:'lb',     type:'upper'},
    {name:'Precor Seated Row',    weight:60,  unit:'lb',     type:'upper'},
    {name:'Genesis Total Quad / Hip',  weight:17.5, unit:'lb', type:'legs'},
    {name:'Genesis Total Glute / Ham', weight:20,   unit:'lb', type:'legs'},
    {name:'Genesis Multiplane Shoulder', weight:25, unit:'lb', type:'upper', caution:'Max 90°'},
    {name:'Genesis Biceps',       weight:20,  unit:'lb',     type:'upper'},
    {name:'Genesis Triceps',      weight:30,  unit:'lb',     type:'upper'},
    {name:'Genesis Multiplane Calf', weight:180, unit:'lb',  type:'legs'},
    {name:'Genesis Dual Cable',   weight:17,  unit:'lb',     type:'upper'},
    {name:'Decline Sit-up',       weight:0,   unit:'corpo',  type:'core'},
  ]
};
const DAY_NAMES=['Domingo','Segunda','Terca','Quarta','Quinta','Sexta','Sabado'];
const DAY_SHORT=['D','S','T','Q','Q','S','S'];
const TRAIN_DAYS={1:'A',3:'B',5:'C'};
const TYPE_EMOJI={upper:'💪',legs:'🦵',core:'🔥'};

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const S={
  get:(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d;}catch{return d;}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
  user:()=>S.get('ga_user',null),
  logs:()=>S.get('ga_logs',[]),
  streak:()=>S.get('ga_streak',0),
  workouts:()=>S.get('ga_workouts',JSON.parse(JSON.stringify(DEFAULT_WORKOUTS))),
  saveWorkouts:w=>S.set('ga_workouts',w),
  addLog:l=>{const logs=S.logs();logs.push(l);S.set('ga_logs',logs);},
};
const $=id=>document.getElementById(id);
const app=document.getElementById('app');
const fmt=iso=>new Date(iso).toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'});
const wLabel=ex=>ex.weight>0?ex.weight+' '+ex.unit:'Corpo livre';

// ─── PROGRESSION ─────────────────────────────────────────────────────────────
function getSuggestion(name,type,weight){
  const thr=type==='legs'?14:12;
  const logs=S.logs();
  const sessions=[];
  for(let i=logs.length-1;i>=0&&sessions.length<2;i--){
    const ex=(logs[i].exercises||[]).find(e=>e.name===name&&e.weight===weight);
    if(ex&&ex.reps.length>=2) sessions.push(ex);
  }
  if(sessions.length<2) return null;
  const ok=s=>s.reps[1]>=thr&&(s.reps[2]==null||s.reps[2]>=thr);
  return(ok(sessions[0])&&ok(sessions[1]))?'up':null;
}

// ─── BOTTOM NAV ───────────────────────────────────────────────────────────────
function bottomNav(active){
  return `<div class="bottom-nav">
    <button class="nav-btn ${active==='home'?'on':''}" onclick="renderDashboard('home')">
      <span class="icon">${active==='home'?'🏠':'🏡'}</span>
      <span class="lbl">Inicio</span>
    </button>
    <button class="nav-btn ${active==='history'?'on':''}" onclick="renderDashboard('history')">
      <span class="icon">📋</span>
      <span class="lbl">Historico</span>
    </button>
    <button class="nav-btn ${active==='weights'?'on':''}" onclick="renderDashboard('weights')">
      <span class="icon">⚖️</span>
      <span class="lbl">Pesos</span>
    </button>
    <button class="nav-btn ${active==='settings'?'on':''}" onclick="renderSettings()">
      <span class="icon">👤</span>
      <span class="lbl">Perfil</span>
    </button>
  </div>`;
}

// ─── ONBOARDING ───────────────────────────────────────────────────────────────
function renderOnboarding(){
  app.innerHTML=`
  <div class="fade-in px" style="min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding-top:40px;padding-bottom:40px;">

    <div style="margin-bottom:36px;">
      <div style="width:60px;height:60px;background:var(--accent);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:24px;box-shadow:0 8px 24px rgba(91,79,255,.3);">💪</div>
      <h1 style="font-size:34px;font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:10px;">Treino no<br>seu controle.</h1>
      <p style="color:var(--subtle);font-size:15px;line-height:1.6;">Log rapido, progressao inteligente<br>e contador automatico de reps.</p>
    </div>

    <div class="card" style="padding:24px;margin-bottom:14px;box-shadow:0 2px 16px rgba(0,0,0,.06);">
      <label style="display:block;color:var(--subtle);font-size:13px;font-weight:500;margin-bottom:8px;">Seu nome</label>
      <input id="ob_name" class="inp" type="text" placeholder="Ex: Rafael" style="margin-bottom:16px;" autocomplete="given-name"/>

      <div style="display:flex;gap:10px;margin-bottom:22px;">
        <div style="flex:1;">
          <label style="display:block;color:var(--subtle);font-size:13px;font-weight:500;margin-bottom:8px;">Altura (cm)</label>
          <input id="ob_height" class="inp" type="number" min="140" max="220" placeholder="175" style="text-align:center;"/>
        </div>
        <div style="flex:1;">
          <label style="display:block;color:var(--subtle);font-size:13px;font-weight:500;margin-bottom:8px;">Peso (kg)</label>
          <input id="ob_weight" class="inp" type="number" min="40" max="200" placeholder="80" style="text-align:center;"/>
        </div>
      </div>

      <label style="display:block;color:var(--subtle);font-size:13px;font-weight:500;margin-bottom:10px;">Dias de treino por semana</label>
      <div style="display:flex;gap:8px;margin-bottom:22px;" id="days-row">
        ${[2,3,4,5].map((n,idx)=>`
          <button onclick="selDays(${n})" id="day_${n}"
            style="flex:1;padding:12px 0;background:${idx===1?'var(--accent)':'var(--bg)'};
            border:1.5px solid ${idx===1?'var(--accent)':'var(--border)'};
            border-radius:12px;color:${idx===1?'#fff':'var(--subtle)'};
            font-size:16px;font-weight:700;cursor:pointer;">${n}</button>`).join('')}
      </div>

      <label style="display:block;color:var(--subtle);font-size:13px;font-weight:500;margin-bottom:10px;">Tempo por sessao</label>
      <div style="display:flex;gap:8px;margin-bottom:28px;">
        ${[['30','Rapido'],['45','Normal'],['60','Completo']].map(([v,h],i)=>`
          <button onclick="selTime('${v}')" id="time_${v}"
            style="flex:1;padding:12px 6px;background:${i===1?'var(--accent)':'var(--bg)'};
            border:1.5px solid ${i===1?'var(--accent)':'var(--border)'};
            border-radius:12px;cursor:pointer;text-align:center;">
            <p style="color:${i===1?'#fff':'var(--text)'};font-size:14px;font-weight:700;">${v}min</p>
            <p style="color:${i===1?'rgba(255,255,255,.7)':'var(--muted)'};font-size:11px;margin-top:2px;">${h}</p>
          </button>`).join('')}
      </div>
      <button class="btn btn-dark" onclick="saveOnboarding()">Comecar →</button>
    </div>
    <p style="color:var(--muted);font-size:12px;text-align:center;">Seus dados ficam apenas neste aparelho</p>
  </div>`;
  window._ob_days=3; window._ob_time='45';
}
window.selDays=function(n){
  [2,3,4,5].forEach(x=>{const b=$('day_'+x);if(!b)return;b.style.background='var(--bg)';b.style.borderColor='var(--border)';b.style.color='var(--subtle)';});
  const b=$('day_'+n);if(b){b.style.background='var(--accent)';b.style.borderColor='var(--accent)';b.style.color='#fff';}
  window._ob_days=n;
};
window.selTime=function(v){
  ['30','45','60'].forEach(x=>{const b=$('time_'+x);if(!b)return;b.style.background='var(--bg)';b.style.borderColor='var(--border)';b.querySelectorAll('p')[0].style.color='var(--text)';b.querySelectorAll('p')[1].style.color='var(--muted)';});
  const b=$('time_'+v);if(b){b.style.background='var(--accent)';b.style.borderColor='var(--accent)';b.querySelectorAll('p')[0].style.color='#fff';b.querySelectorAll('p')[1].style.color='rgba(255,255,255,.7)';}
  window._ob_time=v;
};
window.saveOnboarding=function(){
  const name=$('ob_name').value.trim();
  if(!name){$('ob_name').focus();return;}
  const height=parseInt($('ob_height').value)||175;
  const weight=parseInt($('ob_weight').value)||80;
  S.set('ga_user',{name,trainDays:window._ob_days||3,sessionTime:window._ob_time||'45',height,weight});
  renderDashboard();
};

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDashboard(tab){
  const u=S.user(),streak=S.streak(),logs=S.logs();
  const today=new Date().getDay();
  const scheduled=TRAIN_DAYS[today];
  const weekStart=new Date();weekStart.setDate(weekStart.getDate()-weekStart.getDay());weekStart.setHours(0,0,0,0);
  const weekCount=logs.filter(l=>new Date(l.date)>=weekStart).length;
  const lastLog=logs.length?logs[logs.length-1]:null;
  const t=tab||'home';

  let content='';
  if(t==='home')    content=homeTab(u,scheduled,streak,weekCount,lastLog,today);
  if(t==='history') content=historyTab(logs);
  if(t==='weights') content=weightsTab();

  app.innerHTML=`
  <div class="fade-in">
    <!-- Header -->
    <div class="px safe-top" style="padding-top:20px;padding-bottom:16px;background:var(--bg);">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <p style="color:var(--muted);font-size:13px;font-weight:500;">Ola, ${u.name} 👋</p>
          <p style="font-size:22px;font-weight:800;letter-spacing:-.02em;margin-top:1px;">${DAY_NAMES[today]}</p>
        </div>
        ${streak>0?`
        <div style="background:var(--orange-light);border-radius:24px;padding:8px 14px;display:flex;align-items:center;gap:6px;">
          <span style="font-size:16px;">🔥</span>
          <span style="font-size:14px;font-weight:700;color:var(--orange);">${streak} dias</span>
        </div>`:''}
      </div>
    </div>
    <div class="px" style="padding-bottom:80px;">${content}</div>
    ${bottomNav(t)}
  </div>`;
}

// ─── HOME TAB ─────────────────────────────────────────────────────────────────
function homeTab(u,scheduled,streak,weekCount,lastLog,today){
  return `
    ${scheduled?`
    <div class="workout-hero" style="margin-bottom:14px;box-shadow:0 8px 28px rgba(91,79,255,.25);">
      <p style="font-size:12px;font-weight:600;opacity:.7;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;">Treino de hoje</p>
      <p style="font-size:38px;font-weight:800;letter-spacing:-.03em;margin-bottom:2px;">Treino ${scheduled}</p>
      <p style="font-size:13px;opacity:.75;margin-bottom:20px;">${u.sessionTime} min · ${S.workouts()[scheduled].length} exercicios</p>
      <button onclick="startWorkout('${scheduled}')" style="background:#fff;color:var(--accent);border:none;border-radius:12px;padding:13px 0;width:100%;font-size:15px;font-weight:700;cursor:pointer;">Iniciar agora →</button>
    </div>
    <button onclick="pickWorkout()" class="btn btn-ghost" style="margin-bottom:14px;font-size:14px;">Escolher treino diferente</button>
    `:`
    <div class="card-sm" style="margin-bottom:14px;border:1.5px solid var(--border);">
      <p style="font-weight:700;font-size:17px;margin-bottom:4px;">Dia de descanso 😴</p>
      <p style="color:var(--subtle);font-size:13px;margin-bottom:16px;">Mas nada te impede de treinar!</p>
      <button onclick="pickWorkout()" class="btn btn-dark" style="font-size:15px;">Escolher treino</button>
    </div>
    `}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
      <div class="stat-box" style="box-shadow:0 1px 8px rgba(0,0,0,.05);">
        <p class="label">Sequencia</p>
        <p style="font-size:28px;font-weight:800;letter-spacing:-.02em;">${streak}<span style="font-size:13px;color:var(--muted);font-weight:500;"> dias</span></p>
      </div>
      <div class="stat-box" style="box-shadow:0 1px 8px rgba(0,0,0,.05);">
        <p class="label">Esta semana</p>
        <p style="font-size:28px;font-weight:800;letter-spacing:-.02em;">${weekCount}<span style="font-size:13px;color:var(--muted);font-weight:500;"> / ${u.trainDays}</span></p>
      </div>
    </div>

    <!-- Week bar -->
    <div class="card-sm" style="margin-bottom:14px;box-shadow:0 1px 8px rgba(0,0,0,.05);">
      <p class="label" style="margin-bottom:10px;">Semana</p>
      <div style="display:flex;gap:6px;">
        ${DAY_SHORT.map((d,i)=>{
          const isToday=i===today,isTrain=[1,3,5].includes(i);
          return `<div style="flex:1;aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;
            background:${isToday?'var(--accent)':isTrain?'var(--accent-light)':'var(--card2)'};
            color:${isToday?'#fff':isTrain?'var(--accent)':'var(--muted)'};">${d}</div>`;
        }).join('')}
      </div>
    </div>

    ${lastLog?`
    <div class="card-sm" onclick="showLog('${lastLog.date}')" style="cursor:pointer;box-shadow:0 1px 8px rgba(0,0,0,.05);">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <p class="label" style="margin-bottom:4px;">Ultimo treino</p>
          <p style="font-size:16px;font-weight:700;">Treino ${lastLog.workout}</p>
          <p style="color:var(--muted);font-size:12px;margin-top:2px;">${fmt(lastLog.date)} · ${(lastLog.exercises||[]).length} exercicios</p>
        </div>
        <span style="color:var(--muted);font-size:22px;font-weight:300;">›</span>
      </div>
    </div>`:''}`;
}

// ─── PICK WORKOUT ─────────────────────────────────────────────────────────────
window.pickWorkout=function(){
  const ov=document.createElement('div');
  ov.className='overlay fade-in';ov.id='pick-ov';
  ov.innerHTML=`
  <div class="sheet" style="box-shadow:0 -4px 32px rgba(0,0,0,.12);">
    <div class="sheet-handle"></div>
    <p style="font-size:20px;font-weight:800;margin-bottom:4px;">Qual treino hoje?</p>
    <p style="color:var(--subtle);font-size:13px;margin-bottom:20px;">Escolha o treino que vai fazer agora</p>
    <div style="display:flex;gap:10px;margin-bottom:16px;">
      ${['A','B','C'].map(k=>`
        <button onclick="closePick();startWorkout('${k}')"
          style="flex:1;padding:20px 8px;background:var(--accent-light);border:2px solid var(--accent-light);border-radius:16px;cursor:pointer;text-align:center;">
          <p style="font-size:26px;font-weight:800;color:var(--accent);">${k}</p>

// ─── AUTO REP COUNTER — BODY-AWARE CYCLE DETECTION ───────────────────────────
// Thresholds are calibrated per person using height-based arm length estimation.
// Taller person = longer arm = larger acceleration arc = lower threshold needed.
// Each exercise type has a movement profile (short arc vs long arc).
//
// Arm length ≈ height × 0.36  (shoulder to wrist, cm)
// Forearm    ≈ height × 0.146 (elbow to wrist, cm)
//
// Exercise movement profiles:
//   'curl'     → forearm arc only (short) — biceps, triceps
//   'press'    → full arm push (medium)   — chest press, shoulder
//   'pull'     → full arm pull (long)     — pulldown, row, lat
//   'leg'      → leg extension/curl       — use torso/hip motion
//   'core'     → sit-up                   — torso flex

const EX_PROFILES = {
  'Genesis Biceps':              'curl',
  'Genesis Biceps Preacher':     'curl',
  'Genesis Triceps':             'curl',
  'Genesis Triceps Seated':      'curl',
  'Genesis Multiplane Chest':    'press',
  'Genesis Multiplane Shoulder': 'press',
  'Dumbbell Bench Press':        'press',
  'Genesis Chin / Dip Assist':   'press',
  'Precor Pulldown 304':         'pull',
  'Genesis Lat':                 'pull',
  'Precor Low Row':              'pull',
  'Precor Seated Row':           'pull',
  'Genesis Dual Cable':          'pull',
  'Leg Extension':               'leg',
  'Leg Curl':                    'leg',
  'Prone Leg Curl':              'leg',
  'Inner Thigh':                 'leg',
  'Outer Thigh':                 'leg',
  'Genesis Total Quad / Hip':    'leg',
  'Genesis Total Glute / Ham':   'leg',
  'Genesis Multiplane Calf':     'leg',
  'Decline Sit-up':              'core',
};

// Returns {upThr, downThr, cooldown} calibrated for this person + exercise
function getACThresholds(exName) {
  const u = S.user();
  const height = u?.height || 175; // cm
  // Arm length ratio: taller = longer lever = more acceleration range
  // Base thresholds tuned for 175cm. Scale inversely with arm length.
  const armRatio = 175 / height; // >1 for short people, <1 for tall
  const profile = EX_PROFILES[exName] || 'pull';

  // Base thresholds per movement type (tuned empirically)
  const bases = {
    curl:  { up: 13, down: 8,  cooldown: 350 },
    press: { up: 11, down: 7,  cooldown: 400 },
    pull:  { up: 10, down: 6.5,cooldown: 450 }, // longest arc, lowest threshold
    leg:   { up: 9,  down: 5.5,cooldown: 500 },
    core:  { up: 8,  down: 5,  cooldown: 600 },
  };
  const b = bases[profile];
  return {
    upThr:    +(b.up   * armRatio).toFixed(1),
    downThr:  +(b.down * armRatio).toFixed(1),
    cooldown: b.cooldown,
    profile,
  };
}

      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <span id="ac-num" style="font-size:52px;font-weight:800;line-height:1;letter-spacing:-.03em;">0</span>
        <span style="color:var(--muted);font-size:12px;font-weight:500;">reps</span>
      </div>
    </div>

    <!-- Live signal bar -->
    <div style="margin-bottom:6px;">
      <div style="height:6px;background:var(--card2);border-radius:4px;overflow:hidden;position:relative;">
        <div id="ac-level" style="height:100%;background:var(--accent);width:0%;border-radius:4px;transition:width .08s;"></div>
        <!-- threshold markers -->
        <div style="position:absolute;top:0;bottom:0;width:2px;background:var(--green);opacity:.6;left:${Math.min(thr.upThr/25*100,100)}%;"></div>
        <div style="position:absolute;top:0;bottom:0;width:2px;background:var(--orange);opacity:.6;left:${Math.min(thr.downThr/25*100,100)}%;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px;">
        <span style="color:var(--muted);font-size:10px;">repouso</span>
        <span style="color:var(--green);font-size:10px;">↑ ativa rep</span>
        <span style="color:var(--muted);font-size:10px;">max</span>
      </div>
    </div>

    <p id="ac-status" style="color:var(--muted);font-size:13px;margin-bottom:20px;">Pressione Iniciar e comece a se mover</p>

    <div style="display:flex;gap:10px;margin-bottom:10px;">
      <button id="ac-go" class="btn btn-accent" onclick="acStart()">Iniciar</button>
      <button id="ac-stop" class="btn btn-ghost" style="display:none;" onclick="acStop()">Parar</button>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-ghost" onclick="acCancel()">Cancelar</button>
      <button id="ac-use" class="btn btn-dark" style="display:none;" onclick="acUse()">Usar resultado</button>
    </div>
  </div>`;
  ov.onclick=e=>{if(e.target===ov)acCancel();};
  document.body.appendChild(ov);
};

window.acStart=function(){
  acState.active=true;acState.reps=0;acState.phase='rest';acState.smoothed=0;
  const thr=acState.thr;
  $('ac-go').style.display='none';$('ac-stop').style.display='block';
  $('ac-status').textContent='Movendo! Faca os movimentos completos...';
  $('ac-status').style.color='var(--accent)';

  function onMotion(e){
    if(!acState.active)return;
    const a=e.accelerationIncludingGravity||e.acceleration||{};
    const raw=Math.sqrt((a.x||0)**2+(a.y||0)**2+(a.z||0)**2);
    acState.smoothed=AC_ALPHA*raw+(1-AC_ALPHA)*acState.smoothed;
    const mag=acState.smoothed;

    // Live bar (scale to 25 m/s² max)
    const lvl=$('ac-level');
    if(lvl) lvl.style.width=Math.min(100,mag/25*100)+'%';

    // Cycle detection using calibrated thresholds
    if(acState.phase==='rest' && mag>thr.upThr && !acState.cooldown){
      acState.phase='active';
    } else if(acState.phase==='active' && mag<thr.downThr){
      acState.phase='rest';
      if(!acState.cooldown){
        acState.reps++;
        acState.cooldown=true;
        clearTimeout(acState.cooldownTimer);
        acState.cooldownTimer=setTimeout(()=>{acState.cooldown=false;},thr.cooldown);
        const el=$('ac-num'),ring=$('ac-ring');
        if(el){el.textContent=acState.reps;el.style.color='var(--green)';setTimeout(()=>{if(el)el.style.color='var(--text)';},300);}
        if(ring){const off=352-Math.min(acState.reps/20,1)*352;ring.setAttribute('stroke-dashoffset',off);}
      }
    }
  }

  acState.handler=onMotion;
  if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
    DeviceMotionEvent.requestPermission().then(r=>{
      if(r==='granted')window.addEventListener('devicemotion',onMotion);
      else{$('ac-status').textContent='Permissao negada. Use entrada manual.';$('ac-status').style.color='var(--red)';}
    }).catch(()=>window.addEventListener('devicemotion',onMotion));
  } else {
    window.addEventListener('devicemotion',onMotion);
  }
};

window.acStop=function(){
  acState.active=false;
  if(acState.handler)window.removeEventListener('devicemotion',acState.handler);
  $('ac-stop').style.display='none';
  $('ac-status').textContent=`${acState.reps} reps contadas. Use ou cancele.`;
  $('ac-status').style.color='var(--subtle)';
  const ub=$('ac-use');if(ub){ub.style.display='block';ub.textContent=`Usar ${acState.reps} reps`;}
  const lvl=$('ac-level');if(lvl)lvl.style.width='0%';
};

window.acUse=function(){
  const r=acState.reps;acCancel();if(r>0)window.addSet(r);
};
window.acCancel=function(){
  acState.active=false;
  if(acState.handler)window.removeEventListener('devicemotion',acState.handler);
  $('ac-ov')?.remove();
};

window.saveSettings=function(){
  const u=S.user();

  u.weight=parseInt($('s_weight').value)||u.weight||80;

  S.set('ga_user',u);renderDashboard();
};
window.resetWk=function(){if(confirm('Resetar pesos?')){S.saveWorkouts(JSON.parse(JSON.stringify(DEFAULT_WORKOUTS)));renderDashboard('weights');}};
window.clearAll=function(){if(confirm('Apagar tudo?')){localStorage.clear();renderOnboarding();}};
