<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0c0c0e"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>GymApp</title>
  <style>
    :root{
      --bg:#0c0c0e;--surface:#141416;--surface2:#1c1c1f;--surface3:#242428;
      --border:#2a2a2e;--border-strong:#3a3a3f;--text:#f0f0f2;--text2:#a0a0a8;--text3:#606068;
      --lime:#c8f135;--lime-dim:#1e2a06;--lime-border:#3a5010;
      --amber:#f5a623;--amber-dim:#2a1e06;--red:#e05252;--red-dim:#2a0a0a;--blue:#4a9eff;--blue-dim:#061828;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overscroll-behavior:none;}
    button,input,select,textarea{font-family:inherit;}
    #app{max-width:430px;margin:0 auto;min-height:100vh;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .fade-in{animation:fadeUp .22s ease both;}
    .px{padding-left:20px;padding-right:20px;}
    .pt-safe{padding-top:max(20px,env(safe-area-inset-top));}
    .card{background:var(--surface);border-radius:16px;overflow:hidden;border:1px solid var(--border);}
    .card-sm{background:var(--surface);border-radius:12px;padding:16px;border:1px solid var(--border);}
    .card-inset{background:var(--bg);border-radius:10px;padding:14px 16px;border:1px solid var(--border);}
    .btn{width:100%;padding:15px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:.01em;transition:transform .1s,opacity .15s;border:none;}
    .btn:active{transform:scale(.98);opacity:.9;}
    .btn-primary{background:var(--lime);color:#0c0c0e;box-shadow:0 0 0 1px rgba(200,241,53,.15),0 4px 16px rgba(200,241,53,.12);}
    .btn-primary:active{background:#b8e020;}
    .btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border-strong);}
    .btn-secondary:active{background:var(--surface2);}
    .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
    .btn-danger{background:transparent;color:var(--red);border:1px solid var(--red-dim);}
    .inp{width:100%;padding:13px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;outline:none;transition:border-color .15s;}
    .inp:focus{border-color:var(--lime);}
    .inp::placeholder{color:var(--text3);}
    select.inp{-webkit-appearance:none;}
    .bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom,0);}
    .bnav-btn{flex:1;padding:10px 0 12px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;}
    .bnav-btn .ic{width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
    .bnav-btn .lb{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.02em;}
    .bnav-btn.on .lb{color:var(--lime);}
    .bnav-btn.on svg{stroke:var(--lime) !important;}
    .label{color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:600;}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;letter-spacing:.01em;}
    .badge-lime{background:var(--lime-dim);color:var(--lime);border:1px solid var(--lime-border);}
    .badge-amber{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,166,35,.2);}
    .badge-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(224,82,82,.2);}
    .badge-neutral{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
    .set-row{display:flex;align-items:center;padding:14px 16px;gap:12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
    .set-row:last-child{border-bottom:none;}
    .set-row.done{background:rgba(200,241,53,.04);}
    .set-row.active{background:rgba(200,241,53,.06);}
    .rep-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;}
    .rep-btn{padding:14px 0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;font-weight:500;cursor:pointer;transition:all .1s;}
    .rep-btn:active{background:var(--lime);color:#0c0c0e;border-color:var(--lime);}
    .prog-bar{height:2px;background:var(--surface3);border-radius:2px;overflow:hidden;}
    .prog-fill{height:100%;background:var(--lime);border-radius:2px;transition:width .4s ease;}
    .overlay{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;background:rgba(0,0,0,.7);}
    .sheet{background:var(--surface);border-radius:20px 20px 0 0;border-top:1px solid var(--border);padding:20px 20px max(32px,env(safe-area-inset-bottom));width:100%;max-width:430px;max-height:88vh;overflow-y:auto;}
    .sheet-handle{width:36px;height:3px;background:var(--surface3);border-radius:3px;margin:0 auto 20px;}
    .ob-step{padding:0 20px 40px;min-height:100vh;display:flex;flex-direction:column;justify-content:center;}
    .day-cell{flex:1;aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:1px solid var(--border);background:var(--surface);transition:all .15s;}
    .day-cell.on{background:var(--lime-dim);border-color:var(--lime-border);}
    .sel-opt{padding:14px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;text-align:left;width:100%;}
    .sel-opt.on{border-color:var(--lime-border);background:var(--lime-dim);}
    .sel-opt.on .so-title{color:var(--lime);}
    .hero-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;}
    .stat-box{background:var(--surface);border-radius:12px;padding:16px;border:1px solid var(--border);}
    .divider{height:1px;background:var(--border);margin:0;}
    .wt-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:10px;}
    .wt-row:last-child{border-bottom:none;}
    .info-btn{width:26px;height:26px;border-radius:50%;background:var(--surface2);border:1px solid var(--border-strong);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-style:italic;}
  </style>
</head>

// Convert weight for display
function toDisplay(w, unit){
  if(!w||w===0) return 0;
  const u=unit||S.unit();
  if(u==='kg') return Math.round(w/2.205*4)/4; // lb->kg, round to 0.25
  return w; // already lb
}
function fromDisplay(w, unit){
  const u=unit||S.unit();
  if(u==='kg') return Math.round(w*2.205/2.5)*2.5; // kg->lb
  return w;
}
function dispW(w, unit){
  if(!w||w===0) return '0';
  const u=unit||S.unit();
  const d=toDisplay(w,u);
  return Number.isInteger(d)?String(d):d.toFixed(1).replace(/\.0$/,'');
}
function wLabel(ex){
  if(!ex.weight||ex.weight===0) return T().weightUnit==='lb'?'Bodyweight':'Peso corporal';
  if(ex.unit==='corpo') return T().weightUnit==='lb'?'Bodyweight':'Peso corporal';
  if(ex.unit==='level') return 'Level '+ex.weight;
  return dispW(ex.weight)+' '+(S.unit()==='kg'?'kg':ex.unit||'lb');
}

function estimateWeight(exName, level, bodyWeightKg) {
  const base = BASE_WEIGHTS[exName];
  if(!base) return {weight:0, unit:'corpo'};
  if(base.unit==='corpo') return {weight:0, unit:'corpo'};
  if(base.unit==='level') return {weight:base[level]||base.int, unit:'level'};
  const bw = bodyWeightKg || 80;
  const refBW = 80;
  const scale = level==='day1' ? 1 : Math.sqrt(bw / refBW);
  let w = (base[level] || base.int) * scale;
  w = Math.round(w / 2.5) * 2.5;
  return {weight: w, unit: base.unit};
}

function buildWorkouts(focus, numDays, level, bodyWeightKg) {
  const templates = WORKOUT_TEMPLATES[focus] || WORKOUT_TEMPLATES.full;
  const result = {};
  WORKOUT_KEYS.slice(0, numDays).forEach((key, i) => {
    const exNames = templates[i % templates.length];
    result[key] = exNames.map(name => {
      const meta = EX_LIBRARY[name] || {type:'upper',group:'other'};
      const est = estimateWeight(name, level, bodyWeightKg);
      return {name, weight:est.weight, unit:est.unit, type:meta.type, group:meta.group, caution:meta.caution||null};
    });
  });
  return result;
}

function getScheduleMap(user) {

  const defaults = {2:[1,4],3:[1,3,5],4:[1,2,4,5],5:[1,2,3,4,5]};
  const days = defaults[parseInt(user.trainDays)||3] || defaults[3];
  const map = {};
  days.forEach((d,i)=>{ map[d]=WORKOUT_KEYS[i]; });
  return map;
}

// ─── STREAK LOGIC ────────────────────────────────────────────────────────────
// Streak = consecutive scheduled training days completed (not calendar days)
// Does not count rest days, does not count 2 workouts same day as 2
function calcStreak(logs, schedMap) {
  if(!logs||!logs.length) return 0;
  // Get unique training dates (YYYY-MM-DD), deduplicated
  const trainedDates = [...new Set(logs.map(l=>l.date.slice(0,10)))].sort();
  if(!trainedDates.length) return 0;

  // Build list of scheduled days (0=Sun..6=Sat) from schedMap
  const scheduledDays = Object.keys(schedMap).map(Number);

  // Walk backwards from today counting consecutive scheduled days that were trained
  let streak = 0;
  const today = new Date();
  today.setHours(0,0,0,0);

  // Go back up to 365 days
  let d = new Date(today);
  let missedScheduled = 0;
  for(let i=0; i<365 && missedScheduled<2; i++){
    const dow = d.getDay();
    const ds = d.toISOString().slice(0,10);
    if(scheduledDays.includes(dow)){
      if(trainedDates.includes(ds)){
        streak++;
        missedScheduled=0;
      } else if(ds < today.toISOString().slice(0,10)){
        // missed a scheduled day in the past
        missedScheduled++;
        if(missedScheduled>=1) break;
      }
    }
    d.setDate(d.getDate()-1);
  }
  return streak;
}

// ─── PROGRESSION ─────────────────────────────────────────────────────────────
function getSuggestion(name, type, weight, goal) {
  const g = goal || S.user()?.goal || 'grow';
  // For 'maintain': need 2 weeks (2 sessions) above threshold
  // For 'grow': need 2 sessions above threshold
  // For 'build': need 1 session above threshold
  const sessionsNeeded = g==='build' ? 1 : 2;
  const thr = type==='legs' ? 14 : 12;
  const logs = S.logs();
  const sessions = [];
  for(let i=logs.length-1; i>=0 && sessions.length<sessionsNeeded; i--) {
    const ex=(logs[i].exercises||[]).find(e=>e.name===name&&e.weight===weight);
    if(ex && ex.reps.length>=2) sessions.push(ex);
  }
  if(sessions.length<sessionsNeeded) return null;
  const ok = s => s.reps[1]>=thr && (s.reps[2]==null||s.reps[2]>=thr);
  return sessions.every(ok) ? 'up' : null;
}

function autoAdjustAfterSession(exercises, sessionData) {
  const wk = S.workouts();
  if(!wk) return;
  let changed = false;
  sessionData.forEach(sd => {
    if(!sd || sd.reps.length < 1) return;
    const r2=sd.reps[1]||0, r3=sd.reps[2]||0;
    const avg23 = r3>0 ? (r2+r3)/2 : r2;
    Object.keys(wk).forEach(key => {
      const ex = wk[key].find(e=>e.name===sd.name);
      if(!ex || ex.unit==='corpo' || ex.unit==='level') return;
      let newW = ex.weight;
      if(avg23 >= 18) newW = ex.weight + 10;
      else if(avg23 >= 14) newW = ex.weight + 5;
      else if(avg23 >= 12) newW = ex.weight + 2.5;
      else if(avg23 < 6)   newW = ex.weight - 5;
      else if(avg23 < 8)   newW = ex.weight - 2.5;
      if(newW !== ex.weight) { ex.weight = Math.max(0, newW); changed = true; }
    });
  });
  if(changed) S.saveWorkouts(wk);
  return changed;
}

// Check if user has been away > 7 days
function checkReturnWarning() {
  const logs = S.logs();
  if(!logs.length) return false;
  const last = new Date(logs[logs.length-1].date);
  const now = new Date();
  return (now - last) > 7 * 24 * 60 * 60 * 1000;
}

// ─── AUTO WEIGHT REVIEW ──────────────────────────────────────────────────────
// Auto mode: runs every 14 days automatically
// Manual mode: button available every 7 days
function checkAutoWeightsDue() {
  const cfg = S.settings();
  const last = cfg.lastAutoWeights ? new Date(cfg.lastAutoWeights) : null;
  const now = new Date();
  const intervalDays = cfg.autoWeights ? 14 : 7;
  if(!last) return true;
  return (now - last) > intervalDays * 24 * 60 * 60 * 1000;
}

function daysUntilNextWeightReview() {
  const cfg = S.settings();
  const last = cfg.lastAutoWeights ? new Date(cfg.lastAutoWeights) : null;
  if(!last) return 0;
  const intervalDays = cfg.autoWeights ? 14 : 7;
  const diff = intervalDays - Math.floor((new Date() - last) / (24*60*60*1000));
  return Math.max(0, diff);
}

function runAutoWeightReview() {
  const logs = S.logs();
  const wk = S.workouts();
  if(!wk || !logs.length) return false;
  const u = S.user();
  const goal = u?.goal || 'grow';
  let changed = false;
  // Look at last 14 days of logs
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 14);
  const recentLogs = logs.filter(l => new Date(l.date) >= cutoff);
  if(!recentLogs.length) return false;

  Object.keys(wk).forEach(key => {
    wk[key].forEach(ex => {
      if(ex.unit === 'corpo' || ex.unit === 'level') return;
      // Gather all reps for this exercise in recent logs
      const allSessions = recentLogs
        .map(l => (l.exercises||[]).find(e => e.name === ex.name && e.weight === ex.weight))
        .filter(Boolean);
      if(allSessions.length < 1) return;
      const thr = ex.type === 'legs' ? 14 : 12;
      const sessionsAbove = allSessions.filter(s => {
        const r2 = s.reps[1]||0, r3 = s.reps[2]||0;
        return r2 >= thr && (r3 === 0 || r3 >= thr);
      });
      const sessionsNeeded = goal === 'build' ? 1 : 2;
      if(sessionsAbove.length >= sessionsNeeded) {
        const inc = ex.type === 'legs' ? 5 : 2.5;
        ex.weight = Math.round((ex.weight + inc) / 2.5) * 2.5;
        changed = true;
      }
    });
  });
  if(changed) S.saveWorkouts(wk);
  const cfg = S.settings();
  cfg.lastAutoWeights = new Date().toISOString();
  S.saveSettings(cfg);
  return changed;
}

async function bleScan(onFound) {
  if(!navigator.bluetooth) return null;
  try {
    const device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: ['battery_service']
    });
    if(onFound) onFound(device);
    return device;
  } catch(e) { return null; }
}

  toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--lime);color:#0c0c0e;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;z-index:999;letter-spacing:.02em;';
  toast.textContent = `${type==='arm'?t.bleArmDevice:t.bleLegDevice} — ${t.bleConnected}`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
  // Refresh BLE section in profile if visible
  const el = document.getElementById('ble-devices');
  if(el) el.innerHTML = renderBleDevices(T());
};

window.showExInfo = function(exName) {

  ov.className = 'overlay fade-in'; ov.id = 'exinfo-ov';
  ov.innerHTML = `<div class="sheet" style="max-height:88vh;overflow-y:auto;">
    <div class="sheet-handle"></div>
    <div style="margin-bottom:16px;">
      <p style="font-size:18px;font-weight:800;line-height:1.2;">${exName}</p>

    ${info.caution ? `<div style="background:var(--amber-dim);border-radius:10px;padding:10px 14px;margin-bottom:16px;"><p style="color:var(--amber);font-size:13px;font-weight:600;">! ${info.caution}</p></div>` : ''}

      <p style="font-size:11px;font-weight:700;color:var(--lime);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">${t.personalTip}</p>
      <p style="font-size:13px;color:var(--lime);line-height:1.65;">${info.tips}</p>

function bnav(active) {
  const t=T();
  const ico = (name, on) => {
    const s = on ? 'var(--lime)' : 'var(--text3)';
    const icons = {
      home:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${s}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
      history:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${s}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
      weights:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${s}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><path d="M5 12H2m20 0h-3M5 12a7 7 0 0 1 14 0M5 12a7 7 0 0 0 14 0"/><rect x="2" y="10" width="3" height="4" rx="1"/><rect x="19" y="10" width="3" height="4" rx="1"/></svg>`,
      profile:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${s}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
    };
    return icons[name]||'';
  };
  return `<div class="bnav">
    <button class="bnav-btn ${active==='home'?'on':''}" onclick="renderDashboard('home')"><span class="ic">${ico('home',active==='home')}</span><span class="lb">${t.home}</span></button>
    <button class="bnav-btn ${active==='history'?'on':''}" onclick="renderDashboard('history')"><span class="ic">${ico('history',active==='history')}</span><span class="lb">${t.history}</span></button>
    <button class="bnav-btn ${active==='weights'?'on':''}" onclick="renderDashboard('weights')"><span class="ic">${ico('weights',active==='weights')}</span><span class="lb">${t.weights}</span></button>
    <button class="bnav-btn ${active==='profile'?'on':''}" onclick="renderProfile()"><span class="ic">${ico('profile',active==='profile')}</span><span class="lb">${t.profile}</span></button>
  </div>`;
}

window.setAutoWeights = function(val) {
  const cfg = S.settings(); cfg.autoWeights = val; S.saveSettings(cfg);
  const t = T();
  document.getElementById('aw-auto').style.cssText = `padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid ${val?'var(--lime)':'var(--border)'};background:${val?'var(--lime-dim)':'transparent'};color:${val?'var(--lime)':'var(--text3)'};`;
  document.getElementById('aw-manual').style.cssText = `padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid ${!val?'var(--lime)':'var(--border)'};background:${!val?'var(--lime-dim)':'transparent'};color:${!val?'var(--lime)':'var(--text3)'};`;
  document.getElementById('aw-desc').textContent = val ? t.autoWeightsDesc : t.autoWeightsManualDesc;
  document.getElementById('aw-note').style.display = val ? 'none' : 'block';

  return `<div style="display:flex;gap:6px;margin-bottom:32px;">
    ${[1,2,3,4,5,6].map(i=>`<div style="flex:1;height:3px;border-radius:4px;background:${i<=step?'var(--lime)':'var(--surface2)'};transition:background .3s;"></div>`).join('')}

}

}

function renderDashboard(tab) {
  const u=S.user(),logs=S.logs(),t=T();
  const today=new Date().getDay();

  const weekStart=new Date();weekStart.setDate(weekStart.getDate()-weekStart.getDay());weekStart.setHours(0,0,0,0);

  </div>`;
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  document.body.appendChild(ov);

window.summaryBump = function(key, i, dir) {
  const wk=S.workouts();
  const ex=wk[key][i];
  if(!ex||ex.unit==='corpo'||ex.unit==='level') return;
  // Smart increment: use machine's natural increment
  // lb: most machines 5lb, small cables 2.5lb
  // kg: 2.5kg standard, 1kg for small
  const isSmall = ex.weight < 30; // small cable machines
  const inc = S.unit()==='kg' ? (isSmall?1:2.5) : (isSmall?2.5:5);
  const dispCurrent = toDisplay(ex.weight);
  const newDisp = Math.max(0, dispCurrent + dir*inc);
  ex.weight = fromDisplay(newDisp);
  S.saveWorkouts(wk);
  const el = document.getElementById('sw-'+i);
  if(el) el.textContent = wLabel(ex);
};

// ── Weights Tab ───────────────────────────────────────────────────────────
function weightsTab(u, schedMap) {
  const wk=S.workouts()||{},t=T();
  const keys=Object.keys(wk);
  const DAY_NAMES=t.days;
  const cfg=S.settings();
  const isDue=checkAutoWeightsDue();
  const daysLeft=daysUntilNextWeightReview();

  const manualBanner = !cfg.autoWeights && isDue ? `
    <div style="background:var(--lime-dim);border:1px solid var(--lime-border);border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
      <div>
        <p style="font-size:14px;font-weight:700;color:var(--lime);">&#129504; ${t.autoWeightsDue}</p>
        <p style="font-size:12px;color:var(--lime);opacity:.8;margin-top:2px;">${t.autoWeightsBtn}</p>
      </div>
      <button onclick="doManualWeightReview()" style="padding:8px 14px;background:var(--lime);border:none;border-radius:10px;color:#0c0c0e;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;">${t.reviewWeights}</button>
    </div>` : !cfg.autoWeights && daysLeft > 0 ? `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:14px;">
      <p style="font-size:13px;color:var(--text3);">&#129504; ${t.autoWeightsNotDue} <strong style="color:var(--text2);">${daysLeft} ${t.autoWeightsDays}</strong></p>
    </div>` : '';

  return `<div style="display:flex;flex-direction:column;gap:12px;">
    ${manualBanner}
    ${keys.map(key=>`
      <div class="card">
        <div style="padding:14px 16px 4px;border-bottom:1px solid var(--border);">
          <p style="font-size:16px;font-weight:800;">${t.home==='Home'?'Workout':'Treino'} ${key}</p>
          <p style="color:var(--text3);font-size:12px;margin-top:2px;">${Object.entries(schedMap).filter(([,v])=>v===key).map(([d])=>DAY_NAMES[d]).join(', ')||t.noSchedule}</p>
        </div>
        ${wk[key].map((ex,i)=>{
          const sug=getSuggestion(ex.name,ex.type,ex.weight);
          return `
          <div style="display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);gap:10px;">
            <span style="font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.06em;width:32px;flex-shrink:0;">${TYPE_LABEL[ex.type]||''}</span>
            <div style="flex:1;min-width:0;">
              <p style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${ex.name}</p>
              ${ex.caution?`<p style="color:var(--amber);font-size:11px;margin-top:1px;">! ${ex.caution}</p>`:''}
              ${sug==='up'?`<span class="badge badge-lime" style="margin-top:3px;font-size:11px;">${t.raiseUp} &#8593;</span>`:''}
            </div>
            <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
              ${EX_INFO[ex.name]?`<button onclick="showExInfo('${ex.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}') " class="info-btn">i</button>`:''}
              <button onclick="editWeight('${key}',${i})"
                style="padding:7px 12px;background:var(--surface2);border:1px solid var(--border-strong);border-radius:8px;color:var(--lime);font-size:14px;font-weight:800;cursor:pointer;white-space:nowrap;min-width:64px;text-align:center;">
                ${ex.weight>0?dispW(ex.weight)+' '+(S.unit()==='kg'?'kg':ex.unit||'lb'):'corpo'}
              </button>
            </div>
          </div>`;
        }).join('')}
      </div>`).join('')}
  </div>`;
}

window.doManualWeightReview = function() {
  const t = T();
  const changed = runAutoWeightReview();
  const ov = document.createElement('div'); ov.className = 'overlay fade-in'; ov.id = 'wr-ov';
  ov.innerHTML = `<div class="sheet" style="text-align:center;">
    <div class="sheet-handle"></div>
    <div style="font-size:40px;margin-bottom:12px;">${changed?'&#129504;':'&#9989;'}</div>
    <p style="font-size:18px;font-weight:800;margin-bottom:8px;">${changed?t.weightsAdjusted:'Pesos ja otimizados!'}</p>
    <p style="color:var(--text2);font-size:13px;margin-bottom:20px;">${changed?'Os pesos foram atualizados com base no seu historico recente.':'Continue treinando para acumular mais dados.'}</p>
    <button class="btn btn-primary" onclick="document.getElementById('wr-ov')?.remove();renderDashboard('weights')">OK</button>
  </div>`;
  ov.onclick = e => { if(e.target===ov) ov.remove(); };
  document.body.appendChild(ov);
};

window.editWeight = function(key,i) {
  const wk=S.workouts(),ex=wk[key][i],t=T();
  if(ex.unit==='corpo') return;
  const ov=document.createElement('div');ov.className='overlay fade-in';ov.id='ew-ov';
  const dispVal=ex.unit==='level'?ex.weight:toDisplay(ex.weight);
  const unitLabel=ex.unit==='level'?'level':(S.unit()==='kg'?'kg':ex.unit||'lb');
  ov.innerHTML=`<div class="sheet" style="text-align:center;">
    <div class="sheet-handle"></div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:4px;">${ex.name}</p>
    <div style="display:flex;align-items:baseline;justify-content:center;gap:6px;margin:16px 0 8px;">
      <input id="ew-v" type="number" step="${ex.unit==='level'?1:S.unit()==='kg'?0.5:2.5}" min="0" value="${dispVal}"
        style="font-size:52px;font-weight:800;background:transparent;border:none;color:var(--lime);text-align:center;width:160px;outline:none;"/>
      <span style="font-size:18px;color:var(--text2);">${unitLabel}</span>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:24px;">
      ${ex.unit==='level'?
        [-2,-1,1,2].map(d=>`<button onclick="bumpEW(${d})" style="padding:9px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:${d>0?'var(--lime)':'var(--text2)'};font-size:13px;font-weight:600;cursor:pointer;">${d>0?'+':''}${d}</button>`).join(''):
        (S.unit()==='kg'?[-2.5,-1,1,2.5]:[-5,-2.5,2.5,5]).map(d=>`<button onclick="bumpEW(${d})" style="padding:9px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:${d>0?'var(--lime)':'var(--text2)'};font-size:13px;font-weight:600;cursor:pointer;">${d>0?'+':''}${d}</button>`).join('')
      }
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('ew-ov').remove()">${t.cancel}</button>
      <button class="btn btn-primary" style="flex:1;" onclick="saveEW('${key}',${i})">${t.save}</button>
    </div>
  </div>`;
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  document.body.appendChild(ov);
  setTimeout(()=>$('ew-v')?.select(),100);
};
window.bumpEW = d=>{const inp=$('ew-v');if(inp)inp.value=Math.max(0,parseFloat(inp.value||0)+d);};
window.saveEW = function(key,i) {
  const wk=S.workouts(),ex=wk[key][i];
  const val=parseFloat($('ew-v')?.value);
  if(!isNaN(val)){
    if(ex.unit==='level') ex.weight=val;
    else ex.weight=fromDisplay(val);
    S.saveWorkouts(wk);
  }
  document.getElementById('ew-ov')?.remove();
  renderDashboard('weights');
};

// ═══════════════════════════════════════════════════════════════════════════
// WORKOUT SCREEN
// ═══════════════════════════════════════════════════════════════════════════
window.startWorkout = function(key) {
  const wk=S.workouts()||{};
  const exercises=wk[key]||[];
  let cur=0, sessionData=[];
  const isFirstSession=S.logs().filter(l=>l.workout===key).length===0;
  const t=T();
  const cfg=S.settings();
  const NUM_SETS=cfg.numSets||3;

  // Auto BLE scan only if a device was previously paired
  if(cfg.autoBle && navigator.bluetooth && (cfg.bleArm || cfg.bleLeg)) {
    setTimeout(()=>{
      bleScan(device => showBleFoundPopup(device));
    }, 1500);
  }

  function render() {
    const ex=exercises[cur];
    const sd=sessionData[cur]||{reps:[]};
    const reps=sd.reps;
    const isLast=cur===exercises.length-1;
    const prog=Math.round(((cur+1)/exercises.length)*100);

    app.innerHTML=`
    <div class="fade-in">
      <div class="px pt-safe" style="padding-bottom:12px;">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
          <button onclick="goBack()" style="width:38px;height:38px;border-radius:50%;background:var(--surface);border:1.5px solid var(--border);color:var(--text2);font-size:18px;cursor:pointer;flex-shrink:0;">&#8592;</button>
          <div class="prog-bar" style="flex:1;"><div class="prog-fill" style="width:${prog}%;"></div></div>
          <button onclick="showExList()" style="padding:6px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:20px;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">${cur+1}/${exercises.length} &#9776;</button>
        </div>
        ${isFirstSession?`<div style="background:var(--amber-dim);border-radius:10px;padding:8px 12px;"><p style="font-size:12px;color:var(--amber);font-weight:500;">${t.firstSession}</p></div>`:''}
      </div>

      <div class="px" style="padding-bottom:32px;">
        <div style="margin-bottom:18px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
            <span class="badge badge-neutral">${t.home==='Home'?'Workout':'Treino'} ${key}</span>
            ${ex.caution?`<span class="badge badge-amber">! ${ex.caution}</span>`:''}
          </div>
          <p style="font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1.15;margin-bottom:8px;">${ex.name}</p>
          <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
            <button onclick="editWeightInWorkout('${key}',${cur})"
              style="background:var(--lime-dim);border:1.5px solid var(--lime-border);border-radius:10px;padding:8px 16px;cursor:pointer;display:flex;align-items:baseline;gap:6px;">
              <span style="font-size:24px;font-weight:800;color:var(--lime);">${wLabel(ex)}</span>
              <span style="font-size:11px;color:var(--lime);opacity:.7;">&#9998;</span>
            </button>
            ${EX_INFO[ex.name]?`<button onclick="showExInfo('${ex.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}') " style="width:34px;height:34px;border-radius:50%;background:var(--lime-dim);border:none;color:var(--lime);font-size:16px;font-weight:700;cursor:pointer;flex-shrink:0;">&#9432;</button>`:''}
          </div>
        </div>

        <div class="card" style="margin-bottom:20px;">
          ${Array.from({length:NUM_SETS},(_,i)=>{
            const done=reps[i]!==undefined,active=i===reps.length;
            return `<div class="set-row ${done?'done':active?'active':''}" onclick="${done?`editRepI(${i})`:''}" >
              <div style="width:34px;height:34px;border-radius:10px;background:${done?'var(--lime)':active?'var(--lime)':'var(--surface2)'};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:${done||active?'#0c0c0e':'var(--text3)'};">S${i+1}</div>
              <div style="flex:1;">
                <p style="font-size:14px;font-weight:500;color:${done?'var(--lime)':active?'var(--lime)':'var(--text3)'};">${done?reps[i]+' '+t.reps:active?'Registrar agora':'Aguardando...'}</p>
              </div>
              ${done?`<button onclick="event.stopPropagation();deleteRepI(${i})" style="padding:4px 8px;background:var(--red-dim);border:none;border-radius:6px;color:var(--red);font-size:11px;font-weight:600;cursor:pointer;">${t.deleteRep}</button>`:''}
            </div>`;
          }).join('')}
        </div>

        ${reps.length<NUM_SETS?`
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
            <p style="font-size:14px;font-weight:600;color:var(--text2);">${t.series} ${reps.length+1} — ${t.reps}?</p>
            <button onclick="openAutoCount()" style="padding:6px 12px;background:var(--lime-dim);border:none;border-radius:20px;color:var(--lime);font-size:12px;font-weight:700;cursor:pointer;">Auto</button>
          </div>
          <div class="rep-grid" style="margin-bottom:10px;">
            ${[6,8,10,12,14,15,16,18,20,25].map(n=>`<button class="rep-btn" onclick="addSet(${n})">${n}</button>`).join('')}
          </div>
          <div style="display:flex;gap:8px;margin-bottom:12px;">
            <input id="cr" type="number" min="1" max="99" placeholder="other" class="inp" style="text-align:center;flex:1;"/>
            <button onclick="addCustom()" style="padding:14px 20px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;font-weight:600;cursor:pointer;">OK</button>
          </div>
        `:`
          <button class="btn btn-primary" onclick="nextEx()" style="margin-bottom:10px;">${isLast?t.finish:t.next+' &rarr;'}</button>
        `}
        <!-- 4-button navigation row -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
          <button onclick="goBack()" style="padding:12px 8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;text-align:center;line-height:1.4;">
            <span style="display:block;font-size:10px;color:var(--text3);margin-bottom:2px;">&larr; ${t.back}</span>
            <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;">${cur>0?exercises[cur-1].name.split(' ').slice(0,2).join(' '):'Dashboard'}</span>
          </button>
          <button onclick="skipEx()" style="padding:12px 8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;text-align:center;line-height:1.4;">
            <span style="display:block;font-size:10px;color:var(--text3);margin-bottom:2px;">${isLast?t.skip:'Skip &rarr;'}</span>
            <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;">${isLast?'—':exercises[cur+1]?exercises[cur+1].name.split(' ').slice(0,2).join(' '):'—'}</span>
          </button>
          <button onclick="showExList()" style="padding:12px 8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;text-align:center;">
            All exercises
          </button>
          <button onclick="confirmEndNow()" style="padding:12px 8px;background:transparent;border:1px solid var(--red-dim);border-radius:10px;color:var(--red);font-size:11px;font-weight:600;cursor:pointer;text-align:center;">
            ${t.endNow}
          </button>
        </div>
      </div>
    </div>`;
  }

  // Edit weight inline during workout
  window.editWeightInWorkout = function(wkKey, exIdx) {
    const wk2=S.workouts(),ex=wk2[wkKey][exIdx],t2=T();
    if(ex.unit==='corpo') return;
    const ov=document.createElement('div');ov.className='overlay fade-in';ov.id='eww-ov';
    const dispVal=ex.unit==='level'?ex.weight:toDisplay(ex.weight);
    const unitLabel=ex.unit==='level'?'level':(S.unit()==='kg'?'kg':ex.unit||'lb');
    ov.innerHTML=`<div class="sheet" style="text-align:center;">
      <div class="sheet-handle"></div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:4px;">${ex.name}</p>
      <div style="display:flex;align-items:baseline;justify-content:center;gap:6px;margin:16px 0 8px;">
        <input id="eww-v" type="number" step="${ex.unit==='level'?1:S.unit()==='kg'?0.5:2.5}" min="0" value="${dispVal}"
          style="font-size:52px;font-weight:800;background:transparent;border:none;color:var(--lime);text-align:center;width:160px;outline:none;"/>
        <span style="font-size:18px;color:var(--text2);">${unitLabel}</span>
      </div>
      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:24px;">
        ${ex.unit==='level'?
          [-2,-1,1,2].map(d=>`<button onclick="bumpEWW(${d})" style="padding:9px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:${d>0?'var(--lime)':'var(--text2)'};font-size:13px;font-weight:600;cursor:pointer;">${d>0?'+':''}${d}</button>`).join(''):
          (S.unit()==='kg'?[-2.5,-1,1,2.5]:[-5,-2.5,2.5,5]).map(d=>`<button onclick="bumpEWW(${d})" style="padding:9px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:${d>0?'var(--lime)':'var(--text2)'};font-size:13px;font-weight:600;cursor:pointer;">${d>0?'+':''}${d}</button>`).join('')
        }
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('eww-ov').remove()">${t2.cancel}</button>
        <button class="btn btn-primary" style="flex:1;" onclick="saveEWW('${wkKey}',${exIdx})">${t2.save}</button>
      </div>
    </div>`;
    ov.onclick=e=>{if(e.target===ov)ov.remove();};
    document.body.appendChild(ov);
    setTimeout(()=>$('eww-v')?.select(),100);
  };
  window.bumpEWW = d=>{const inp=$('eww-v');if(inp)inp.value=Math.max(0,parseFloat(inp.value||0)+d);};
  window.saveEWW = function(wkKey,exIdx) {
    const wk2=S.workouts(),ex=wk2[wkKey][exIdx];
    const val=parseFloat($('eww-v')?.value);
    if(!isNaN(val)){
      if(ex.unit==='level') ex.weight=val;
      else ex.weight=fromDisplay(val);
      S.saveWorkouts(wk2);
      // Update local exercises array too
      exercises[exIdx].weight=ex.weight;
    }
    document.getElementById('eww-ov')?.remove();
    render();
  };

  window.showExList = function() {
    const t2=T();
    const ov=document.createElement('div');ov.className='overlay fade-in';ov.id='exlist-ov';
    ov.innerHTML=`<div class="sheet" style="max-height:85vh;overflow-y:auto;">
      <div class="sheet-handle"></div>
      <p style="font-size:18px;font-weight:800;margin-bottom:4px;">${t2.home==='Home'?'Workout':'Treino'} ${key}</p>
      <p style="color:var(--text2);font-size:13px;margin-bottom:16px;">Toque para ir direto ao exercicio</p>
      ${exercises.map((ex,i)=>{
        const done=(sessionData[i]?.reps?.length||0)===3;
        const current=i===cur,started=(sessionData[i]?.reps?.length||0)>0;
        return `<div style="display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:12px;">
          <div style="width:36px;height:36px;border-radius:10px;background:${done?'var(--lime-dim)':current?'var(--lime)':started?'var(--lime-dim)':'var(--bg)'};color:${done?'var(--lime)':current?'#0c0c0e':'var(--lime)'};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;cursor:pointer;" onclick="jumpTo(${i})">
            ${done?'&#10003;':current?'&#9654;':i+1}
          </div>
          <div style="flex:1;min-width:0;cursor:pointer;" onclick="jumpTo(${i})">
            <p style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;${current?'color:var(--lime)':''}">${ex.name}</p>
            <p style="color:var(--lime);font-size:13px;font-weight:700;margin-top:1px;">${wLabel(ex)}</p>
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            ${done&&sessionData[i]?`<span class="badge badge-lime" style="font-size:11px;">${sessionData[i].reps.join('/')}</span>`:''}
            ${EX_INFO[ex.name]?`<button onclick="showExInfo('${ex.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}') " style="width:26px;height:26px;border-radius:50%;background:var(--lime-dim);border:none;color:var(--lime);font-size:13px;font-weight:700;cursor:pointer;">&#9432;</button>`:''}
          </div>
        </div>`;
      }).join('')}
      <button class="btn btn-ghost" style="margin-top:12px;" onclick="document.getElementById('exlist-ov').remove()">${t2.cancel}</button>
    </div>`;
    ov.onclick=e=>{if(e.target===ov)ov.remove();};
    document.body.appendChild(ov);
  };
  window.jumpTo = i=>{document.getElementById('exlist-ov')?.remove();cur=i;render();};

  window.editRepI = function(si) {
    const t2=T();
    const ov=document.createElement('div');ov.className='overlay fade-in';ov.id='er-ov';
    const curReps=sessionData[cur]?.reps||[];
    ov.innerHTML=`<div class="sheet" style="text-align:center;">
      <div class="sheet-handle"></div>
      <p style="color:var(--text2);font-size:13px;margin-bottom:4px;">${exercises[cur].name}</p>
      <p style="color:var(--text3);font-size:12px;margin-bottom:20px;">${t2.series} ${si+1}</p>
      <input id="er-v" type="number" min="1" max="99" value="${curReps[si]||''}"
        style="font-size:52px;font-weight:800;background:transparent;border:none;color:var(--text);text-align:center;width:100%;outline:none;margin-bottom:24px;"/>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('er-ov').remove()">${t2.cancel}</button>
        <button class="btn btn-primary" style="flex:1;" onclick="saveEditRepI(${si})">${t2.save}</button>
      </div>
    </div>`;
    ov.onclick=e=>{if(e.target===ov)ov.remove();};
    document.body.appendChild(ov);
    setTimeout(()=>$('er-v')?.select(),100);
  };
  window.saveEditRepI = function(si) {
    const val=parseInt($('er-v')?.value);
    if(val>0&&sessionData[cur]){sessionData[cur].reps[si]=val;}
    document.getElementById('er-ov')?.remove();render();
  };
  window.deleteRepI = function(si) {
    if(sessionData[cur]&&sessionData[cur].reps){
      sessionData[cur].reps.splice(si,1);
    }
    render();
  };

  window.addSet = function(r) {
    if(!sessionData[cur]) sessionData[cur]={name:exercises[cur].name,weight:exercises[cur].weight,unit:exercises[cur].unit,reps:[]};
    if(sessionData[cur].reps.length<NUM_SETS){sessionData[cur].reps.push(r);render();}
  };
  window.addCustom = function(){const v=parseInt($('cr')?.value);if(v>0)addSet(v);};
  window.nextEx = function(){
    if(cur<exercises.length-1){cur++;render();}
    else{
      // Check for any incomplete exercises before finishing
      const hasIncomplete = exercises.some((ex,i)=>!sessionData[i]||sessionData[i].reps.length===0);
      if(hasIncomplete) showPreFinishReview();
      else finishWorkout();
    }
  };
  window.skipEx = function(){
    if(!sessionData[cur])sessionData[cur]={name:exercises[cur].name,weight:exercises[cur].weight,unit:exercises[cur].unit,reps:[],skipped:true};
    else sessionData[cur].skipped=true;
    if(cur<exercises.length-1){cur++;render();}
    else{showPreFinishReview();}
  };
  window.goBack = function(){cur>0?(cur--,render()):renderDashboard();};

  window.confirmEndNow = function() {
    const t2=T();
    const ov=document.createElement('div');ov.className='overlay fade-in';ov.id='end-ov';
    ov.innerHTML=`<div class="sheet" style="text-align:center;">
      <div class="sheet-handle"></div>

      </div>
    </div>`;
    ov.onclick=e=>{if(e.target===ov)ov.remove();};
    document.body.appendChild(ov);
  };

  function showPreFinishReview() {
    const t2=T();
    const incomplete = exercises.map((ex,i)=>({ex,i,sd:sessionData[i]}))
      .filter(({sd})=>!sd||sd.reps.length===0);
    if(!incomplete.length){finishWorkout();return;}
    const ov=document.createElement('div');ov.className='overlay fade-in';ov.id='prefin-ov';
    ov.innerHTML=`<div class="sheet" style="max-height:85vh;overflow-y:auto;">
      <div class="sheet-handle"></div>

      <p style="color:var(--text2);font-size:13px;margin-bottom:16px;">${incomplete.length} exercise${incomplete.length>1?'s':''} not completed. Go back or finish.</p>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:20px;">
        ${incomplete.map(({ex,i})=>`
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border-radius:10px;gap:10px;">
            <p style="font-size:13px;font-weight:600;flex:1;">${ex.name}</p>
            <button onclick="document.getElementById('prefin-ov').remove();cur=${i};render();" style="padding:5px 12px;background:var(--lime-dim);border:1px solid var(--lime-border);border-radius:6px;color:var(--lime);font-size:12px;font-weight:600;cursor:pointer;">Go back</button>
          </div>`).join('')}
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <button class="btn btn-primary" onclick="document.getElementById('prefin-ov').remove();finishWorkout(true)">${t2.finishAnyway}</button>
        <button class="btn btn-ghost" onclick="document.getElementById('prefin-ov').remove();render()">${t2.keepGoing}</button>
      </div>
    </div>`;
    ov.onclick=e=>{if(e.target===ov){ov.remove();render();}};
    document.body.appendChild(ov);
  }

  function finishWorkout(fromEndNow) {
    // Build full exercise list: completed sets + N/A for skipped/incomplete
    const allExercises = exercises.map((ex, i) => {
      const sd = sessionData[i];
      if(sd && sd.reps && sd.reps.length > 0) {
        return {name:ex.name, weight:ex.weight, unit:ex.unit, reps:sd.reps};
      }
      // Skipped or not reached — mark as N/A, exclude from weight progression
      return {name:ex.name, weight:ex.weight, unit:ex.unit, reps:[], skipped:true};
    });
    // Only use completed sets for weight progression
    const doneForProgression = allExercises.filter(s => !s.skipped && s.reps.length > 0);
    S.addLog({date:new Date().toISOString(),workout:key,exercises:allExercises});
    const adjusted = autoAdjustAfterSession(exercises, doneForProgression);
    const u=S.user();
    const schedMap=getScheduleMap(u);
    const newStreak=calcStreak(S.logs(),schedMap);
    S.set('ga_streak',newStreak);
    const t2=T();
    const doneCount = allExercises.filter(s=>!s.skipped).length;
    const skippedCount = allExercises.filter(s=>s.skipped).length;

    app.innerHTML=`
    <div class="fade-in px pt-safe" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding-bottom:40px;">
      <p style="font-size:34px;font-weight:800;letter-spacing:-.03em;margin-bottom:6px;">${t2.workoutDone}</p>
      <p style="color:var(--text2);font-size:15px;margin-bottom:4px;">${t2.home==='Home'?'Workout':'Treino'} ${key} · ${doneCount} ${t2.exercises}</p>

      <p style="color:var(--amber);font-size:14px;font-weight:600;margin-bottom:${adjusted?'12px':'40px'};">${newStreak} ${t2.daysStreak}</p>
      ${adjusted?`<div style="background:var(--lime-dim);border:1px solid var(--lime-border);border-radius:10px;padding:12px 16px;margin-bottom:32px;max-width:320px;"><p style="color:var(--lime);font-size:13px;font-weight:600;">${t2.weightsAdjusted}</p></div>`:''}
      <div style="width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px;">
        <button class="btn btn-primary" onclick="renderDashboard()">${t2.returnHome}</button>
        <button class="btn btn-ghost" onclick="renderDashboard('history')">${t2.seeHistory}</button>
      </div>
    </div>`;
  }
  render();
};

// AUTO REP COUNTER
// ═══════════════════════════════════════════════════════════════════════════
const EX_PROFILES={'Genesis Biceps':'curl','Genesis Biceps Preacher':'curl','Genesis Triceps':'curl','Genesis Triceps Seated':'curl','Genesis Multiplane Chest':'press','Genesis Multiplane Shoulder':'press','Dumbbell Bench Press':'press','Genesis Chin / Dip Assist':'press','Precor Pulldown 304':'pull','Genesis Lat':'pull','Precor Low Row':'pull','Precor Seated Row':'pull','Genesis Dual Cable':'pull','Leg Extension':'leg','Leg Curl':'leg','Prone Leg Curl':'leg','Inner Thigh':'leg','Outer Thigh':'leg','Genesis Total Quad / Hip':'leg','Genesis Total Glute / Ham':'leg','Genesis Multiplane Calf':'leg','Decline Sit-up':'core'};
function getACThresholds(exName){
  const u=S.user();const h=u?.height||175;const ratio=175/h;
  const bases={curl:{up:13,down:8,cd:350},press:{up:11,down:7,cd:400},pull:{up:10,down:6.5,cd:450},leg:{up:9,down:5.5,cd:500},core:{up:8,down:5,cd:600}};
  const b=bases[EX_PROFILES[exName]||'pull'];
  return{upThr:+(b.up*ratio).toFixed(1),downThr:+(b.down*ratio).toFixed(1),cooldown:b.cd,profile:EX_PROFILES[exName]||'pull'};
}
let acState={active:false,handler:null,reps:0,phase:'rest',smoothed:0,cooldown:false,cooldownTimer:null,thr:null};
const AC_ALPHA=0.25;

window.openAutoCount = function() {
  const t=T();
  const exName=(typeof exercises!=='undefined'&&typeof cur!=='undefined')?exercises[cur]?.name||'':'';
  const thr=getACThresholds(exName);

  acState={active:false,handler:null,reps:0,phase:'rest',smoothed:0,cooldown:false,cooldownTimer:null,thr};
  const ov=document.createElement('div');ov.className='overlay fade-in';ov.id='ac-ov';
  ov.innerHTML=`<div class="sheet" style="text-align:center;">

window.acStart = function() {
  const t=T();
  acState.active=true;acState.reps=0;acState.phase='rest';acState.smoothed=0;
  const thr=acState.thr;
  $('ac-go').style.display='none';$('ac-stop').style.display='block';
  $('ac-status').textContent=t.moving;$('ac-status').style.color='var(--lime)';
  function onMotion(e){
    if(!acState.active)return;
    const a=e.accelerationIncludingGravity||e.acceleration||{};
    const raw=Math.sqrt((a.x||0)**2+(a.y||0)**2+(a.z||0)**2);
    acState.smoothed=AC_ALPHA*raw+(1-AC_ALPHA)*acState.smoothed;
    const mag=acState.smoothed;
    const lvl=$('ac-level');if(lvl)lvl.style.width=Math.min(100,mag/25*100)+'%';
    if(acState.phase==='rest'&&mag>thr.upThr&&!acState.cooldown){acState.phase='active';}
    else if(acState.phase==='active'&&mag<thr.downThr){
      acState.phase='rest';
      if(!acState.cooldown){
        acState.reps++;acState.cooldown=true;
        clearTimeout(acState.cooldownTimer);
        acState.cooldownTimer=setTimeout(()=>{acState.cooldown=false;},thr.cooldown);
        const el=$('ac-num'),ring=$('ac-ring');
        if(el){el.textContent=acState.reps;el.style.color='var(--lime)';setTimeout(()=>{if(el)el.style.color='var(--text)';},300);}
        if(ring){ring.setAttribute('stroke-dashoffset',327-Math.min(acState.reps/20,1)*327);}
      }
    }
  }
  acState.handler=onMotion;
  if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
    DeviceMotionEvent.requestPermission().then(r=>{if(r==='granted')window.addEventListener('devicemotion',onMotion);else{$('ac-status').textContent=T().permDenied;$('ac-status').style.color='var(--red)';}}).catch(()=>window.addEventListener('devicemotion',onMotion));
  }else{window.addEventListener('devicemotion',onMotion);}
};
window.acStop = function() {
  const t=T();
  acState.active=false;if(acState.handler)window.removeEventListener('devicemotion',acState.handler);
  $('ac-stop').style.display='none';
  $('ac-status').textContent=`${acState.reps} ${t.reps}. ${t.useResult}`;$('ac-status').style.color='var(--text2)';
  const ub=$('ac-use');if(ub){ub.style.display='block';ub.textContent=`${t.useReps} ${acState.reps} ${t.reps}`;}
  const lvl=$('ac-level');if(lvl)lvl.style.width='0%';
};
window.acUse = function(){const r=acState.reps;acCancel();if(r>0)window.addSet(r);};
window.acCancel = function(){acState.active=false;if(acState.handler)window.removeEventListener('devicemotion',acState.handler);document.getElementById('ac-ov')?.remove();};

  const cfg = S.settings();
  if(type==='arm') cfg.bleArm = null;
  else cfg.bleLeg = null;
  S.saveSettings(cfg);
  const el = document.getElementById('ble-devices');
  if(el) el.innerHTML = renderBleDevices(T());
};

window.profileBleConnect = function() {
  bleScan(device => {
    if(device) showBleFoundPopup(device);
  });
};

window.profileBleScan = function() {
  const t = T();
  const cfg = S.settings();
  if(!cfg.bleArm && !cfg.bleLeg) {
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;';
    toast.textContent = 'No paired devices. Use Connect first.';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
    return;
  }
  // Test: try to reconnect known device
  bleScan(device => {
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--lime);color:#0c0c0e;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;z-index:999;';
    toast.textContent = device ? `${t.bleConnected}: ${device.name||'Sensor'}` : t.bleDisconnected;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  });
};

window.editSchedule = function() {
  const u=S.user(),t=T();
  OB={...u,selectedDays:Object.keys(getScheduleMap(u)).map(Number)};
  const DAY_SHORT=t.daysShort;
  const ov=document.createElement('div');ov.className='overlay fade-in';ov.id='sched-ov';
  ov.innerHTML=`<div class="sheet" style="max-height:85vh;overflow-y:auto;">
    <div class="sheet-handle"></div>
    <p style="font-size:18px;font-weight:800;margin-bottom:4px;">${t.editSchedule}</p>
    <p style="color:var(--text2);font-size:13px;margin-bottom:16px;">${t.scheduleDesc}</p>
    <div style="display:flex;gap:6px;margin-bottom:16px;">
      ${DAY_SHORT.map((d,i)=>`
        <div class="day-cell ${OB.selectedDays.includes(i)?'on':''}" onclick="toggleDay(${i})" id="dc_${i}">
          <span style="font-size:12px;font-weight:700;color:${OB.selectedDays.includes(i)?'var(--lime)':'var(--text2)'};">${d}</span>
          <span style="font-size:9px;color:${OB.selectedDays.includes(i)?'var(--lime)':'var(--text3)'};" id="dc_lbl_${i}">${OB.selectedDays.includes(i)?WORKOUT_KEYS[OB.selectedDays.indexOf(i)]:''}</span>
        </div>`).join('')}
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="document.getElementById('sched-ov').remove()">${t.cancel}</button>
      <button class="btn btn-primary" style="flex:1;" onclick="saveSchedule()">${t.save}</button>
    </div>
  </div>`;
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  document.body.appendChild(ov);
};
window.saveSchedule = function() {
  const u=S.user();
  const schedule={};
  OB.selectedDays.forEach((d,i)=>{schedule[d]=WORKOUT_KEYS[i];});
  u.schedule=schedule;u.trainDays=OB.selectedDays.length;
  S.set('ga_user',u);document.getElementById('sched-ov')?.remove();renderProfile();
};

window.resetWk = function() {
  const t=T();
  if(confirm(t.resetWeights+'?')){
    const u=S.user();
    const wk=buildWorkouts(u.focus||'full',u.trainDays||3,u.level||'int',u.weight||80);
    S.saveWorkouts(wk);renderProfile();
  }
};
window.clearAll = function() {
  const t=T();
  if(confirm(t.clearAll+'?')){localStorage.clear();OB={};renderOnboarding();}
};

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
(function init(){
  const u=S.user();
  if(!u){OB={};renderOnboarding();}
  else if(!S.workouts()){
    const wk=buildWorkouts(u.focus||'full',u.trainDays||3,u.level||'int',u.weight||80);
    S.saveWorkouts(wk);renderDashboard();
  }
  else{
    // Auto weight review if enabled and due
    const cfg=S.settings();
    if(cfg.autoWeights && checkAutoWeightsDue() && S.logs().length > 0) {
      runAutoWeightReview();
    }
    renderDashboard();
  }
})();
</script>
</body>
</html>
