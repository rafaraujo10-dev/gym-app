<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0c0c0e"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>GymApp</title>
  <style>
    :root{
      /* Dark premium palette — inspired by Strong / Whoop */
      --bg:#0c0c0e;
      --surface:#141416;
      --surface2:#1c1c1f;
      --surface3:#242428;
      --border:#2a2a2e;
      --border-strong:#3a3a3f;
      --text:#f0f0f2;
      --text2:#a0a0a8;
      --text3:#606068;
      --lime:#c8f135;        /* signature accent — premium athletic */
      --lime-dim:#1e2a06;
      --lime-border:#3a5010;
      --amber:#f5a623;
      --amber-dim:#2a1e06;
      --red:#e05252;
      --red-dim:#2a0a0a;
      --blue:#4a9eff;
      --blue-dim:#061828;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overscroll-behavior:none;}
    button,input,select,textarea{font-family:inherit;}
    #app{max-width:430px;margin:0 auto;min-height:100vh;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    @keyframes pop{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
    .fade-in{animation:fadeUp .22s ease both;}

    .px{padding-left:20px;padding-right:20px;}
    .pt-safe{padding-top:max(20px,env(safe-area-inset-top));}

    /* ── Cards ── */
    .card{background:var(--surface);border-radius:16px;overflow:hidden;border:1px solid var(--border);}
    .card-sm{background:var(--surface);border-radius:12px;padding:16px;border:1px solid var(--border);}
    .card-inset{background:var(--bg);border-radius:10px;padding:14px 16px;border:1px solid var(--border);}

    /* ── Buttons ── */
    .btn{width:100%;padding:15px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:.01em;transition:transform .1s,opacity .15s;}
    .btn:active{transform:scale(.98);opacity:.9;}

    /* Primary — lime on dark */
    .btn-primary{background:var(--lime);color:#0c0c0e;border:none;box-shadow:0 0 0 1px rgba(200,241,53,.15),0 4px 16px rgba(200,241,53,.12);}
    .btn-primary:active{background:#b8e020;}

    /* Secondary — outlined */
    .btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border-strong);}
    .btn-secondary:active{background:var(--surface2);}

    /* Ghost — minimal */
    .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}

    /* Danger */
    .btn-danger{background:transparent;color:var(--red);border:1px solid var(--red-dim);}

    /* ── Inputs ── */
    .inp{width:100%;padding:13px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;outline:none;transition:border-color .15s;}
    .inp:focus{border-color:var(--lime);}
    .inp::placeholder{color:var(--text3);}
    select.inp{-webkit-appearance:none;}

    /* ── Bottom nav ── */
    .bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom,0);}
    .bnav-btn{flex:1;padding:10px 0 12px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;}
    .bnav-btn .ic{width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
    .bnav-btn .lb{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.02em;}
    .bnav-btn.on .lb{color:var(--lime);}
    .bnav-btn.on svg{stroke:var(--lime) !important;}

    /* ── Labels ── */
    .label{color:var(--text3);font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:600;}

    /* ── Badges ── */
    .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;letter-spacing:.01em;}
    .badge-lime{background:var(--lime-dim);color:var(--lime);border:1px solid var(--lime-border);}
    .badge-amber{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,166,35,.2);}
    .badge-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(224,82,82,.2);}
    .badge-neutral{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}

    /* ── Set row ── */
    .set-row{display:flex;align-items:center;padding:14px 16px;gap:12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
    .set-row:last-child{border-bottom:none;}
    .set-row.done{background:rgba(200,241,53,.04);}
    .set-row.active{background:rgba(200,241,53,.06);}

    /* ── Rep grid ── */
    .rep-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;}
    .rep-btn{padding:14px 0;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;font-weight:500;cursor:pointer;transition:all .1s;}
    .rep-btn:active{background:var(--lime);color:#0c0c0e;border-color:var(--lime);}

    /* ── Progress bar ── */
    .prog-bar{height:2px;background:var(--surface3);border-radius:2px;overflow:hidden;}
    .prog-fill{height:100%;background:var(--lime);border-radius:2px;transition:width .4s ease;}

    /* ── Overlay / Sheet ── */
    .overlay{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;background:rgba(0,0,0,.7);}
    .sheet{background:var(--surface);border-radius:20px 20px 0 0;border-top:1px solid var(--border);padding:20px 20px max(32px,env(safe-area-inset-bottom));width:100%;max-width:430px;max-height:88vh;overflow-y:auto;}
    .sheet-handle{width:36px;height:3px;background:var(--surface3);border-radius:3px;margin:0 auto 20px;}

    /* ── Onboarding ── */
    .ob-step{padding:0 20px 40px;min-height:100vh;display:flex;flex-direction:column;justify-content:center;}

    /* ── Day cell ── */
    .day-cell{flex:1;aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;border:1px solid var(--border);background:var(--surface);transition:all .15s;}
    .day-cell.on{background:var(--lime-dim);border-color:var(--lime-border);}
    .day-cell.on .dc-d{color:var(--lime) !important;}
    .day-cell.on .dc-k{color:var(--lime) !important;opacity:.8;}

    /* ── Select option ── */
    .sel-opt{padding:14px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;text-align:left;width:100%;}
    .sel-opt.on{border-color:var(--lime-border);background:var(--lime-dim);}
    .sel-opt.on .so-title{color:var(--lime);}

    /* ── Hero card ── */
    .hero-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;}

    /* ── Stat box ── */
    .stat-box{background:var(--surface);border-radius:12px;padding:16px;border:1px solid var(--border);}

    /* ── Divider ── */
    .divider{height:1px;background:var(--border);margin:0;}

    /* ── Wt row ── */
    .wt-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:10px;}
    .wt-row:last-child{border-bottom:none;}

    /* ── Info button ── */
    .info-btn{width:26px;height:26px;border-radius:50%;background:var(--surface2);border:1px solid var(--border-strong);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-style:italic;}
  </style>
</head>

  'Outer Thigh':                {beg:90, int:130, adv:160, unit:'lb'},

// Full body workout templates (exercises per workout)
const WORKOUT_TEMPLATES = {
  full:[
    ['Precor Pulldown 304','Genesis Lat','Precor Low Row','Leg Extension','Leg Curl','Genesis Multiplane Shoulder','Genesis Biceps','Genesis Triceps','Dumbbell Bench Press','Inner Thigh','Outer Thigh','Decline Sit-up'],
    ['Genesis Chin / Dip Assist','Genesis Multiplane Chest','Precor Low Row','Leg Extension','Prone Leg Curl','Genesis Multiplane Shoulder','Genesis Biceps Preacher','Genesis Triceps Seated','Inner Thigh','Outer Thigh','Decline Sit-up'],
    ['Genesis Lat','Precor Pulldown 304','Precor Seated Row','Genesis Total Quad / Hip','Genesis Total Glute / Ham','Genesis Multiplane Shoulder','Genesis Biceps','Genesis Triceps','Genesis Multiplane Calf','Genesis Dual Cable','Decline Sit-up'],
    ['Genesis Multiplane Chest','Genesis Chin / Dip Assist','Precor Seated Row','Leg Extension','Prone Leg Curl','Genesis Multiplane Shoulder','Genesis Biceps Preacher','Genesis Triceps Seated','Genesis Multiplane Calf','Inner Thigh','Decline Sit-up'],
    ['Precor Pulldown 304','Genesis Multiplane Chest','Precor Low Row','Genesis Total Quad / Hip','Genesis Total Glute / Ham','Genesis Multiplane Shoulder','Genesis Biceps','Genesis Triceps','Genesis Dual Cable','Outer Thigh','Decline Sit-up'],

// ─── STORAGE ─────────────────────────────────────────────────────────────────
const S={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),

  logs:()=>S.get('ga_logs',[]),
  streak:()=>S.get('ga_streak',0),
  workouts:()=>S.get('ga_workouts',null),

  addLog:l=>{const logs=S.logs();logs.push(l);S.set('ga_logs',logs);},
};
const $=id=>document.getElementById(id);
const app=document.getElementById('app');
const fmt=iso=>new Date(iso).toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'});
const wLabel=ex=>ex.weight>0?ex.weight+' '+ex.unit:'Corpo livre';

// ─── WEIGHT ESTIMATION ───────────────────────────────────────────────────────
// Estimates starting weight based on level + body weight scaling
function estimateWeight(exName, level, bodyWeightKg) {
  const base = BASE_WEIGHTS[exName];
  if(!base) return {weight:0, unit:'corpo'};
  if(base.unit==='corpo') return {weight:0, unit:'corpo'};
  if(base.unit==='level') return {weight:base[level]||base.int, unit:'level'};

  const bw = bodyWeightKg || 80;
  const refBW = 80; // reference body weight for base values
  const scale = Math.sqrt(bw / refBW); // square root scaling (strength doesn't scale linearly)

  let w = (base[level] || base.int) * scale;
  // Round to nearest 2.5
  w = Math.round(w / 2.5) * 2.5;
  return {weight: w, unit: base.unit};
}

// Build workout objects from template + estimates
function buildWorkouts(focus, numDays, level, bodyWeightKg) {
  const templates = WORKOUT_TEMPLATES[focus] || WORKOUT_TEMPLATES.full;
  const result = {};
  WORKOUT_KEYS.slice(0, numDays).forEach((key, i) => {
    const exNames = templates[i % templates.length];
    result[key] = exNames.map(name => {
      const meta = EX_LIBRARY[name] || {type:'upper',group:'other'};
      const est = estimateWeight(name, level, bodyWeightKg);
      return {
        name,
        weight: est.weight,
        unit: est.unit,
        type: meta.type,
        group: meta.group,
        caution: meta.caution || null,
      };
    });
  });
  return result;
}

// ─── SCHEDULE ────────────────────────────────────────────────────────────────
// Returns {dayIndex: 'WorkoutKey'} from user's schedule config
function getScheduleMap(user) {
  if(user.schedule) return user.schedule; // custom schedule
  // fallback defaults
  const defaults = {2:[1,4],3:[1,3,5],4:[1,2,4,5],5:[1,2,3,4,5]};
  const days = defaults[parseInt(user.trainDays)||3] || defaults[3];
  const map = {};
  days.forEach((d,i)=>{ map[d]=WORKOUT_KEYS[i]; });
  return map;
}

// ─── PROGRESSION ─────────────────────────────────────────────────────────────
function getSuggestion(name, type, weight) {
  const thr = type==='legs' ? 14 : 12;
  const logs = S.logs();
  const sessions = [];
  for(let i=logs.length-1; i>=0 && sessions.length<2; i--) {
    const ex=(logs[i].exercises||[]).find(e=>e.name===name&&e.weight===weight);
    if(ex && ex.reps.length>=2) sessions.push(ex);
  }
  if(sessions.length<2) return null;
  const ok = s => s.reps[1]>=thr && (s.reps[2]==null||s.reps[2]>=thr);
  return (ok(sessions[0])&&ok(sessions[1])) ? 'up' : null;
}

// Auto-adjust weight after first session
function autoAdjustAfterSession(exercises, sessionData) {
  const wk = S.workouts();
  if(!wk) return;
  let changed = false;
  sessionData.forEach(sd => {
    if(!sd || sd.reps.length < 2) return;
    const r1=sd.reps[0]||0, r2=sd.reps[1]||0, r3=sd.reps[2]||0;
    const avg23 = r3>0 ? (r2+r3)/2 : r2;
    // Find exercise in workouts
    Object.keys(wk).forEach(key => {
      const ex = wk[key].find(e=>e.name===sd.name);
      if(!ex || ex.unit==='corpo' || ex.unit==='level') return;
      let newW = ex.weight;
      if(avg23 >= 18) newW = ex.weight + 10;       // very easy &rarr; +10
      else if(avg23 >= 14) newW = ex.weight + 5;   // easy &rarr; +5
      else if(avg23 >= 12) newW = ex.weight + 2.5; // good &rarr; +2.5
      else if(avg23 < 6)   newW = ex.weight - 5;   // too hard &rarr; -5
      else if(avg23 < 8)   newW = ex.weight - 2.5; // hard &rarr; -2.5
      if(newW !== ex.weight) { ex.weight = Math.max(0, newW); changed = true; }
    });
  });
  if(changed) S.saveWorkouts(wk);
  return changed;
}

// Show exercise info sheet
window.showExInfo = function(exName) {
  const info = EX_INFO[exName];
  if(!info) return;
  const ov = document.createElement('div');
  ov.className = 'overlay fade-in'; ov.id = 'exinfo-ov';
  ov.innerHTML = `<div class="sheet" style="max-height:88vh;overflow-y:auto;">
    <div class="sheet-handle"></div>
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;">
      <div>
        <p style="font-size:18px;font-weight:800;line-height:1.2;">${exName}</p>
        <p style="color:var(--text3);font-size:12px;margin-top:4px;"> ${info.muscles}</p>
      </div>
    </div>

    ${info.caution ? `
    <div style="background:var(--amber-dim);border-radius:10px;padding:10px 14px;margin-bottom:16px;">
      <p style="color:var(--amber);font-size:13px;font-weight:600;">! ${info.caution}</p>
    </div>` : ''}

    <div style="margin-bottom:16px;">
      <p style="font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">Como executar</p>
      ${info.howto.map((step, i) => `
        <div style="display:flex;gap:10px;margin-bottom:10px;">
          <div style="width:24px;height:24px;border-radius:50%;background:var(--lime);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:1px;">${i+1}</div>
          <p style="font-size:14px;line-height:1.6;color:var(--text);">${step}</p>
        </div>`).join('')}
    </div>

    <div style="background:var(--lime-dim);border-radius:12px;padding:12px 14px;margin-bottom:20px;">
      <p style="font-size:12px;font-weight:700;color:var(--lime);margin-bottom:4px;">💡 Dica do personal</p>
      <p style="font-size:13px;color:var(--lime);line-height:1.6;">${info.tips}</p>
    </div>

    <button class="btn btn-primary" onclick="$('exinfo-ov').remove()">Entendido</button>
  </div>`;
  ov.onclick = e => { if(e.target===ov) ov.remove(); };
  document.body.appendChild(ov);
};

// ─── BOTTOM NAV ───────────────────────────────────────────────────────────────
function bnav(active) {
  const ico = (name, active) => {
    const s = active ? 'var(--lime)' : 'var(--text3)';
    const icons = {
      home: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${s}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
      history: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${s}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
      weights: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${s}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><path d="M5 12H2m20 0h-3M5 12a7 7 0 0 1 14 0M5 12a7 7 0 0 0 14 0"/><rect x="2" y="10" width="3" height="4" rx="1"/><rect x="19" y="10" width="3" height="4" rx="1"/></svg>`,
      profile: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${s}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
    };
    return icons[name] || '';
  };
  return `<div class="bnav">
    <button class="bnav-btn ${active==='home'?'on':''}" onclick="renderDashboard('home')"><span class="ic">${ico('home',active==='home')}</span><span class="lb">Inicio</span></button>
    <button class="bnav-btn ${active==='history'?'on':''}" onclick="renderDashboard('history')"><span class="ic">${ico('history',active==='history')}</span><span class="lb">Historico</span></button>
    <button class="bnav-btn ${active==='weights'?'on':''}" onclick="renderDashboard('weights')"><span class="ic">${ico('weights',active==='weights')}</span><span class="lb">Pesos</span></button>
    <button class="bnav-btn ${active==='profile'?'on':''}" onclick="renderProfile()"><span class="ic">${ico('profile',active==='profile')}</span><span class="lb">Perfil</span></button>
  </div>`;
}

let OB = {}; // onboarding state

function renderOnboarding(step) {
  OB.step = step || 1;
  const steps = {1:obStep1, 2:obStep2, 3:obStep3, 4:obStep4gym, 5:obStep5weights, 6:obStep6confirm};
  app.innerHTML = (steps[OB.step] || obStep1)();
}

function obProgress(step) {
  return `<div style="display:flex;gap:6px;margin-bottom:32px;">
    ${[1,2,3,4,5,6].map(i=>`
      <div style="flex:1;height:3px;border-radius:4px;background:${i<=step?'var(--lime)':'var(--surface2)'};transition:background .3s;"></div>`).join('')}
  </div>`;
}

// ── Step 1: Name + Body ───────────────────────────────────────────────────

      <div>

      </div>
      <div style="display:flex;gap:10px;">
        <div style="flex:1;">
          <label style="display:block;color:var(--text2);font-size:13px;font-weight:500;margin-bottom:8px;">Altura (cm)</label>
          <input id="ob1_height" class="inp" type="number" min="140" max="220" placeholder="175" style="text-align:center;" value="${OB.height||''}"/>

        <label style="display:block;color:var(--text2);font-size:13px;font-weight:500;margin-bottom:10px;">Sexo biologico <span style="color:var(--text3);font-size:11px;">(afeta estimativa de forca)</span></label>
        <div style="display:flex;gap:8px;">
          ${[['M','Masculino'],['F','Feminino']].map(([v,l])=>`
            <button onclick="OB.sex='${v}';document.querySelectorAll('.sex-btn').forEach(b=>b.classList.remove('on'));this.classList.add('on');"

  </div>`;

window.obNext1 = function() {
  const name = $('ob1_name').value.trim();
  const height = parseInt($('ob1_height').value);
  const weight = parseInt($('ob1_weight').value);
  if(!name) { $('ob1_name').focus(); return; }
  if(!height || height<140 || height>220) { $('ob1_height').focus(); return; }
  if(!weight || weight<40 || weight>200) { $('ob1_weight').focus(); return; }
  if(!OB.sex) { alert('Selecione o sexo biologico'); return; }
  OB.name=name; OB.height=height; OB.weight=weight;
  renderOnboarding(2);
};

function renderDashboard(tab) {

  }

};

// ═══════════════════════════════════════════════════════════════════════════
// AUTO REP COUNTER
// ═══════════════════════════════════════════════════════════════════════════
const EX_PROFILES={'Genesis Biceps':'curl','Genesis Biceps Preacher':'curl','Genesis Triceps':'curl','Genesis Triceps Seated':'curl','Genesis Multiplane Chest':'press','Genesis Multiplane Shoulder':'press','Dumbbell Bench Press':'press','Genesis Chin / Dip Assist':'press','Precor Pulldown 304':'pull','Genesis Lat':'pull','Precor Low Row':'pull','Precor Seated Row':'pull','Genesis Dual Cable':'pull','Leg Extension':'leg','Leg Curl':'leg','Prone Leg Curl':'leg','Inner Thigh':'leg','Outer Thigh':'leg','Genesis Total Quad / Hip':'leg','Genesis Total Glute / Ham':'leg','Genesis Multiplane Calf':'leg','Decline Sit-up':'core'};
function getACThresholds(exName){
  const u=S.user();const h=u?.height||175;const ratio=175/h;
  const bases={curl:{up:13,down:8,cd:350},press:{up:11,down:7,cd:400},pull:{up:10,down:6.5,cd:450},leg:{up:9,down:5.5,cd:500},core:{up:8,down:5,cd:600}};
  const b=bases[EX_PROFILES[exName]||'pull'];
  return{upThr:+(b.up*ratio).toFixed(1),downThr:+(b.down*ratio).toFixed(1),cooldown:b.cd,profile:EX_PROFILES[exName]||'pull'};
}
let acState={active:false,handler:null,reps:0,phase:'rest',smoothed:0,cooldown:false,cooldownTimer:null,thr:null};
const AC_ALPHA=0.25;

window.openAutoCount=function(){
  const exName=(typeof exercises!=='undefined'&&typeof cur!=='undefined')?exercises[cur]?.name||'':'';
  const thr=getACThresholds(exName);
  const u=S.user();const armCm=u?.height?Math.round(u.height*0.36):null;
  acState={active:false,handler:null,reps:0,phase:'rest',smoothed:0,cooldown:false,cooldownTimer:null,thr};
  const ov=document.createElement('div');ov.className='overlay fade-in';ov.id='ac-ov';
  ov.innerHTML=`<div class="sheet" style="text-align:center;">
    <div class="sheet-handle"></div>
    <p style="font-size:20px;font-weight:800;margin-bottom:4px;">Contador automatico</p>
    <p style="color:var(--text2);font-size:13px;margin-bottom:10px;">Segure o celular no punho e faca o movimento completo</p>
    ${exName?`<div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:16px;"><span class="badge badge-neutral">${thr.profile}</span>${armCm?`<span class="badge badge-neutral" style="background:var(--surface2);color:var(--text2);">braco ~${armCm}cm</span>`:''}</div>`:''}
    <div style="position:relative;width:120px;height:120px;margin:0 auto 16px;">
      <svg width="120" height="120" style="position:absolute;top:0;left:0;transform:rotate(-90deg);">
        <circle cx="60" cy="60" r="52" fill="none" stroke="var(--surface2)" stroke-width="7"/>
        <circle id="ac-ring" cx="60" cy="60" r="52" fill="none" stroke="var(--lime)" stroke-width="7" stroke-dasharray="327" stroke-dashoffset="327" stroke-linecap="round" style="transition:stroke-dashoffset .25s;"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <span id="ac-num" style="font-size:48px;font-weight:800;line-height:1;">0</span>
        <span style="color:var(--text3);font-size:11px;">reps</span>
      </div>
    </div>
    <div style="height:6px;background:var(--surface2);border-radius:4px;margin-bottom:16px;overflow:hidden;position:relative;">
      <div id="ac-level" style="height:100%;background:var(--lime);width:0%;border-radius:4px;transition:width .08s;"></div>
    </div>
    <p id="ac-status" style="color:var(--text3);font-size:13px;margin-bottom:20px;">Pressione Iniciar</p>
    <div style="display:flex;gap:10px;margin-bottom:10px;">
      <button id="ac-go" class="btn btn-primary" onclick="acStart()">Iniciar</button>
      <button id="ac-stop" class="btn btn-ghost" style="display:none;" onclick="acStop()">Parar</button>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-ghost" onclick="acCancel()">Cancelar</button>
      <button id="ac-use" class="btn btn-primary" style="display:none;" onclick="acUse()">Usar resultado</button>
    </div>
  </div>`;
  ov.onclick=e=>{if(e.target===ov)acCancel();};
  document.body.appendChild(ov);
};
window.acStart=function(){
  acState.active=true;acState.reps=0;acState.phase='rest';acState.smoothed=0;
  const thr=acState.thr;
  $('ac-go').style.display='none';$('ac-stop').style.display='block';
  $('ac-status').textContent='Movendo! Faca os movimentos completos...';
  $('ac-status').style.color='var(--lime)';
  function onMotion(e){
    if(!acState.active)return;
    const a=e.accelerationIncludingGravity||e.acceleration||{};
    const raw=Math.sqrt((a.x||0)**2+(a.y||0)**2+(a.z||0)**2);
    acState.smoothed=AC_ALPHA*raw+(1-AC_ALPHA)*acState.smoothed;
    const mag=acState.smoothed;
    const lvl=$('ac-level');if(lvl)lvl.style.width=Math.min(100,mag/25*100)+'%';
    if(acState.phase==='rest'&&mag>thr.upThr&&!acState.cooldown){acState.phase='active';}
    else if(acState.phase==='active'&&mag<thr.downThr){
      acState.phase='rest';
      if(!acState.cooldown){
        acState.reps++;acState.cooldown=true;
        clearTimeout(acState.cooldownTimer);
        acState.cooldownTimer=setTimeout(()=>{acState.cooldown=false;},thr.cooldown);
        const el=$('ac-num'),ring=$('ac-ring');
        if(el){el.textContent=acState.reps;el.style.color='var(--lime)';setTimeout(()=>{if(el)el.style.color='var(--text)';},300);}
        if(ring){ring.setAttribute('stroke-dashoffset',327-Math.min(acState.reps/20,1)*327);}
      }
    }
  }
  acState.handler=onMotion;
  if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
    DeviceMotionEvent.requestPermission().then(r=>{if(r==='granted')window.addEventListener('devicemotion',onMotion);else{$('ac-status').textContent='Permissao negada.';$('ac-status').style.color='var(--red)';}}).catch(()=>window.addEventListener('devicemotion',onMotion));
  }else{window.addEventListener('devicemotion',onMotion);}
};
window.acStop=function(){
  acState.active=false;if(acState.handler)window.removeEventListener('devicemotion',acState.handler);
  $('ac-stop').style.display='none';
  $('ac-status').textContent=`${acState.reps} reps. Use ou cancele.`;$('ac-status').style.color='var(--text2)';
  const ub=$('ac-use');if(ub){ub.style.display='block';ub.textContent=`Usar ${acState.reps} reps`;}
  const lvl=$('ac-level');if(lvl)lvl.style.width='0%';
};
window.acUse=function(){const r=acState.reps;acCancel();if(r>0)window.addSet(r);};
window.acCancel=function(){acState.active=false;if(acState.handler)window.removeEventListener('devicemotion',acState.handler);$('ac-ov')?.remove();};

window.renderProfile=function(){
  const u=S.user();
  const schedMap=getScheduleMap(u);
  app.innerHTML=`
  <div class="fade-in px pt-safe" style="padding-bottom:80px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
      <p style="font-size:22px;font-weight:800;">Perfil</p>
    </div>

    <!-- Avatar -->
    <div style="text-align:center;margin-bottom:24px;">
      <div style="width:72px;height:72px;background:var(--lime);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:#fff;margin:0 auto 10px;box-shadow:0 8px 24px rgba(91,79,255,.25);">${(u.name||'?').charAt(0).toUpperCase()}</div>
      <p style="font-size:20px;font-weight:800;">${u.name}</p>
      <p style="color:var(--text3);font-size:13px;margin-top:2px;">${u.height}cm · ${u.weight}kg · ${u.level==='beg'?'Iniciante':u.level==='adv'?'Avancado':'Intermediario'}</p>
    </div>

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;">
      <div class="stat-box" style="text-align:center;"><p style="font-size:20px;font-weight:800;">${S.streak()}</p><p class="label" style="margin-top:2px;">Sequencia</p></div>
      <div class="stat-box" style="text-align:center;"><p style="font-size:20px;font-weight:800;">${S.logs().length}</p><p class="label" style="margin-top:2px;">Treinos</p></div>
      <div class="stat-box" style="text-align:center;"><p style="font-size:20px;font-weight:800;">${Math.round(u.height*0.36)}cm</p><p class="label" style="margin-top:2px;">Braco</p></div>
    </div>

    <!-- Edit profile -->
    <div class="card" style="margin-bottom:12px;">
      <div style="padding:14px 16px 0;"><p class="label" style="margin-bottom:14px;">Editar perfil</p></div>
      <div style="padding:0 16px 16px;display:flex;flex-direction:column;gap:12px;">
        <div><label style="display:block;color:var(--text2);font-size:13px;font-weight:500;margin-bottom:6px;">Nome</label><input id="p_name" class="inp" value="${u.name}"/></div>
        <div style="display:flex;gap:10px;">
          <div style="flex:1;"><label style="display:block;color:var(--text2);font-size:13px;font-weight:500;margin-bottom:6px;">Altura (cm)</label><input id="p_height" class="inp" type="number" value="${u.height||175}" style="text-align:center;"/></div>
          <div style="flex:1;"><label style="display:block;color:var(--text2);font-size:13px;font-weight:500;margin-bottom:6px;">Peso (kg)</label><input id="p_weight" class="inp" type="number" value="${u.weight||80}" style="text-align:center;"/></div>
        </div>
        <div><label style="display:block;color:var(--text2);font-size:13px;font-weight:500;margin-bottom:6px;">Foco do treino</label>
          <select id="p_focus" class="inp">
            ${[['full','Full Body'],['upper','Upper Body'],['lower','Lower Body']].map(([v,l])=>`<option value="${v}" ${u.focus===v?'selected':''}>${l}</option>`).join('')}
          </select>
        </div>
        <button class="btn btn-primary" onclick="saveProfile()">Salvar alteracoes</button>
      </div>
    </div>

    <!-- Schedule -->
    <div class="card" style="margin-bottom:12px;">
      <div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
        <p style="font-size:15px;font-weight:700;">Agenda de treinos</p>
        <button onclick="editSchedule()" style="padding:6px 12px;background:var(--lime-dim);border:none;border-radius:8px;color:var(--lime);font-size:12px;font-weight:600;cursor:pointer;">Editar</button>
      </div>
      <div style="padding:12px 16px;">
        ${Object.entries(schedMap).sort(([a],[b])=>a-b).map(([d,k])=>`
          <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);">
            <span style="font-size:14px;color:var(--text2);">${DAY_NAMES[d]}</span>
            <span style="font-size:14px;font-weight:700;">Treino ${k}</span>
          </div>`).join('')}
      </div>
    </div>

    <div class="card-sm" style="margin-bottom:10px;">
      <button onclick="resetWk()" style="width:100%;padding:10px;background:transparent;border:none;color:var(--amber);font-size:14px;font-weight:600;cursor:pointer;text-align:left;">Resetar pesos para estimativa inicial</button>
    </div>
    <div class="card-sm">
      <button onclick="clearAll()" style="width:100%;padding:10px;background:transparent;border:none;color:var(--text3);font-size:14px;cursor:pointer;text-align:left;">Apagar todos os dados e recomecar</button>
    </div>
  </div>
  ${bnav('profile')}`;
};

window.saveProfile=function(){
  const u=S.user();
  u.name=$('p_name').value.trim()||u.name;
  u.height=parseInt($('p_height').value)||u.height;
  u.weight=parseInt($('p_weight').value)||u.weight;
  u.focus=$('p_focus').value;
  S.set('ga_user',u);renderProfile();
};

window.editSchedule=function(){
  // Re-run step 3 of onboarding inline
  const u=S.user();
  OB={...u, selectedDays: Object.keys(getScheduleMap(u)).map(Number)};
  const ov=document.createElement('div');ov.className='overlay fade-in';ov.id='sched-ov';
  ov.innerHTML=`<div class="sheet" style="max-height:85vh;overflow-y:auto;">
    <div class="sheet-handle"></div>
    <p style="font-size:18px;font-weight:800;margin-bottom:4px;">Editar agenda</p>
    <p style="color:var(--text2);font-size:13px;margin-bottom:16px;">Selecione os dias de treino</p>
    <div style="display:flex;gap:6px;margin-bottom:16px;">
      ${DAY_SHORT.map((d,i)=>`
        <div class="day-cell ${OB.selectedDays.includes(i)?'on':''}" onclick="toggleDay(${i})" id="dc_${i}">
          <span style="font-size:12px;font-weight:700;color:${OB.selectedDays.includes(i)?'#fff':'var(--text2)'};">${d}</span>
          <span style="font-size:9px;color:${OB.selectedDays.includes(i)?'rgba(255,255,255,.7)':'var(--text3)'};" id="dc_lbl_${i}">${OB.selectedDays.includes(i)?WORKOUT_KEYS[OB.selectedDays.indexOf(i)]:''}</span>
        </div>`).join('')}
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="$('sched-ov').remove()">Cancelar</button>
      <button class="btn btn-primary" style="flex:1;" onclick="saveSchedule()">Salvar</button>
    </div>
  </div>`;
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  document.body.appendChild(ov);
};
window.saveSchedule=function(){
  const u=S.user();
  const schedule={};
  OB.selectedDays.forEach((d,i)=>{schedule[d]=WORKOUT_KEYS[i];});
  u.schedule=schedule;u.trainDays=OB.selectedDays.length;
  S.set('ga_user',u);$('sched-ov')?.remove();renderProfile();
};

window.resetWk=function(){
  if(confirm('Resetar pesos para estimativa inicial?')){
    const u=S.user();
    const wk=buildWorkouts(u.focus||'full',u.trainDays||3,u.level||'int',u.weight||80);
    S.saveWorkouts(wk);renderProfile();
  }
};
window.clearAll=function(){
  if(confirm('Apagar tudo e recomecar o onboarding?')){localStorage.clear();OB={};renderOnboarding();}
};

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
(function init(){
  const u=S.user();
  if(!u){OB={};renderOnboarding();}
  else if(!S.workouts()){
    // Has user but no workouts — rebuild
    const wk=buildWorkouts(u.focus||'full',u.trainDays||3,u.level||'int',u.weight||80);
    S.saveWorkouts(wk);renderDashboard();
  }
  else{renderDashboard();}
})();
</script>
</body>
</html>
